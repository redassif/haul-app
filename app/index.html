// --- Fit intelligence ---
// Mirrors src/lib/fit.js. Inlined because this file uses in-browser Babel
// and can't ESM-import. Keep in sync with the server-side module.
const FIT_LENGTH_CATS = ['crop','waist','hip','mid_thigh','knee','midi','maxi'];
const FIT_LENGTH_LABELS = {crop:'crop',waist:'waist',hip:'hip',mid_thigh:'mid-thigh',knee:'knee',midi:'midi',maxi:'ankle'};
const FIT_STYLES = ['slim','regular','relaxed','oversized'];
const FIT_SIZES = ['XXS','XS','S','M','L','XL','XXL'];
const FIT_BUILDS = ['slim','mid','curvy'];
const FIT_LEN_EXCLUDED = new Set(['shoes','accessory','bottom']);
const FIT_STYLE_EXCLUDED = new Set(['shoes','accessory']);
const _fitIdx=(a,v)=>{const i=a.indexOf(v);return i>=0?i:null;};
const _fitClamp=(i,a,b)=>Math.max(a,Math.min(b,i));

function analyzeFit({creator={},user={},item={}}={}){
  const out={length:null,fit_style:null,size:null,flags:[]};
  if(item.length_on_creator && !FIT_LEN_EXCLUDED.has(item.category)){
    const i=_fitIdx(FIT_LENGTH_CATS,item.length_on_creator);
    if(i!==null && creator.height_cm && user.height_cm){
      const diff=creator.height_cm-user.height_cm, shift=Math.round(diff/10);
      const newIdx=_fitClamp(i+shift,0,FIT_LENGTH_CATS.length-1);
      out.length={on_creator:item.length_on_creator,on_user:FIT_LENGTH_CATS[newIdx],shift_steps:shift,height_diff_cm:diff};
      if(Math.abs(shift)>=2) out.flags.push({kind:'length_mismatch',message:`Length shifts ${Math.abs(shift)} categories ${shift>0?'longer':'shorter'} on you.`});
    }
  }
  if(item.fit_style && creator.build && user.build && !FIT_STYLE_EXCLUDED.has(item.category)){
    const cb=_fitIdx(FIT_BUILDS,creator.build), ub=_fitIdx(FIT_BUILDS,user.build), si=_fitIdx(FIT_STYLES,item.fit_style);
    if(cb!==null && ub!==null && si!==null){
      const bd=ub-cb, adj=_fitClamp(si-bd,0,FIT_STYLES.length-1);
      out.fit_style={on_creator:item.fit_style,on_user:FIT_STYLES[adj],build_diff:bd,adjusted:adj!==si};
      if(Math.abs(bd)>=2) out.flags.push({kind:'build_mismatch',message:`Cut was styled on a very different build — will read quite differently.`});
    }
  }
  if(creator.usual_size && user.usual_size){
    const c=_fitIdx(FIT_SIZES,creator.usual_size), u=_fitIdx(FIT_SIZES,user.usual_size);
    if(c!==null && u!==null) out.size={delta:u-c,creator:creator.usual_size,user:user.usual_size};
  }
  return out;
}

// Human-readable notes derived from an analysis. Empty array = nothing to say.
function fitNotes(analysis, creatorName){
  if(!analysis) return [];
  const out=[];
  if(analysis.size && analysis.size.delta!==0){
    const dir = analysis.size.delta>0?'sizing up':'sizing down';
    out.push(`Consider ${dir} — ${creatorName||'creator'} wore ${analysis.size.creator} but you typically wear ${analysis.size.user}`);
  }
  if(analysis.length && analysis.length.shift_steps!==0){
    const onUser = FIT_LENGTH_LABELS[analysis.length.on_user]||analysis.length.on_user;
    const onCreator = FIT_LENGTH_LABELS[analysis.length.on_creator]||analysis.length.on_creator;
    out.push(`Hits at ${onUser} on you (was ${onCreator} on ${creatorName||'creator'})`);
  }
  if(analysis.fit_style && analysis.fit_style.adjusted){
    out.push(`Will read ${analysis.fit_style.on_user} on your build`);
  }
  for(const f of (analysis.flags||[])) out.push(f.message);
  return out;
}

function formatHaulForFeed(haul, items, creatorProfile){
  const initial = (haul.creator_name||"?")[0].toUpperCase();
  const idx = haul.id.charCodeAt(0) % BG_GRADIENTS.length;
  return {
    id: haul.id,
    creator_id: haul.creator_id,
    creator: haul.creator_name||"Creator",
    handle: haul.creator_handle||"@user",
    av: initial,
    avc: AV_COLORS[idx % AV_COLORS.length],
    title: haul.title,
    views: haul.views?.toString()||"0",
    likes: haul.likes?.toString()||"0",
    thumb: "🎬",
    bg: BG_GRADIENTS[idx],
    video_url: haul.video_url||null,
    verified: creatorProfile?.verified===true,
    creator_height_cm: creatorProfile?.height_cm||null,
    creator_build: creatorProfile?.build||null,
    creator_usual_size: creatorProfile?.usual_size||null,
    items: (items||[]).map(i=>({
      id: i.id,
      name: i.name,
      brand: i.brand||"",
      price: i.price||0,
      color: "#888888",
      checked: true,
      link: i.link||null,
      category: i.category||null,
      fit_style: i.fit_style||null,
      length_on_creator: i.length_on_creator||null,
    })),
  };
}

// Hauls and creator_profiles share creator_id (both FK to auth.users.id)
// but there's no direct FK between them, so we can't do a Supabase nested
// select. Fetch profiles separately and join in JS.
// Supabase public URLs look like:
// https://{project}.supabase.co/storage/v1/object/public/haul-videos/{path}
// We need the path when deleting the underlying object.
function storagePathFromVideoUrl(url){
  if(!url) return null;
  const m = url.match(/\/haul-videos\/(.+)$/);
  return m ? decodeURIComponent(m[1]) : null;
}

async function enrichHaulsWithCreatorProfiles(hauls){
  const ids = [...new Set(hauls.map(h=>h.creator_id).filter(Boolean))];
  if(ids.length===0) return hauls.map(h=>({...h, _creatorProfile:null}));
  const {data} = await supabase.from("creator_profiles").select("*").in("creator_id", ids);
  const byId = new Map((data||[]).map(p=>[p.creator_id, p]));
  return hauls.map(h=>({...h, _creatorProfile: byId.get(h.creator_id)||null}));
}

}

        </div>

            style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
        </div>

        <button onClick={handleSubmit} disabled={loading||!email||!password}

                  {notes.map((n,i)=>(
                    <div key={i} style={{marginTop:i?4:0}}>
                      <span style={{fontWeight:700,color:C.accent,marginRight:6}}>Fit</span>{n}
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"white",borderTop:`1px solid ${C.border}`,padding:"14px 16px 24px",boxShadow:"0 -8px 30px rgba(26,18,9,0.08)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:12,color:C.muted,fontFamily:FB}}>{selected.length} item{selected.length!==1?"s":""} selected</div>
          <div style={{fontSize:19,fontWeight:800,color:C.dark,fontFamily:FD}}>${total.toFixed(2)}</div>
        </div>
        <button onClick={()=>selected.length>0&&onCheckout(selected,total)} disabled={selected.length===0} style={{width:"100%",padding:14,borderRadius:14,border:"none",background:selected.length>0?C.accent:C.border,color:selected.length>0?"white":C.muted,fontWeight:800,fontSize:14,fontFamily:FBtn,cursor:selected.length>0?"pointer":"not-allowed"}}>
          {selected.length>0?`Buy ${selected.length===haul.items.length?"Full Look":"Selected"} — 1 Checkout`:"Select items to buy"}
        </button>
      </div>
    </div>
  );
}

function FitOnboarding({onSave, onSkip}){
  const [height,setHeight]=useState("");
  const [usualSize,setUsualSize]=useState("");
  const [build,setBuild]=useState("");
  const [saving,setSaving]=useState(false);

  const canSave = height && usualSize && build && !saving;

  const save=async()=>{
    setSaving(true);
    const {data:{user}} = await supabase.auth.getUser();
    if(!user){ setSaving(false); return; }
    const profile={user_id:user.id, height_cm:parseInt(height,10), usual_size:usualSize, build};
    const {error} = await supabase.from("user_profiles").upsert(profile,{onConflict:"user_id"});
    setSaving(false);
    if(!error) onSave(profile);
  };

  const fieldStyle={width:"100%",padding:"12px 14px",borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,marginBottom:10,background:C.bg,fontFamily:FB,boxSizing:"border-box"};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,0.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000}}>
      <div style={{background:C.card,borderRadius:"20px 20px 0 0",padding:24,maxWidth:420,width:"100%",boxShadow:"0 -8px 24px rgba(0,0,0,0.1)"}}>
        <div style={{fontSize:22,fontFamily:FD,fontWeight:700,marginBottom:4,color:C.dark}}>Set up your fit</div>
        <div style={{fontSize:13,color:C.muted,fontFamily:FB,marginBottom:18}}>30 seconds. We'll personalize every recommendation so you know how it'll actually fit you — not the creator.</div>
        <input type="number" placeholder="Height (cm)" value={height} onChange={e=>setHeight(e.target.value)} style={fieldStyle}/>
        <select value={usualSize} onChange={e=>setUsualSize(e.target.value)} style={fieldStyle}>
          <option value="">Usual size</option>
          {["XXS","XS","S","M","L","XL","XXL"].map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <select value={build} onChange={e=>setBuild(e.target.value)} style={fieldStyle}>
          <option value="">Build</option>
          <option value="slim">Slim</option>
          <option value="mid">Mid</option>
          <option value="curvy">Curvy</option>
        </select>
        <button onClick={save} disabled={!canSave} style={{width:"100%",padding:14,borderRadius:10,background:canSave?C.accent:C.border,color:"white",border:"none",fontSize:15,fontWeight:600,fontFamily:FBtn,cursor:canSave?"pointer":"not-allowed",marginTop:4}}>
          {saving?"Saving…":"Save & personalize"}
        </button>
        <button onClick={onSkip} style={{width:"100%",padding:10,marginTop:6,background:"transparent",border:"none",color:C.muted,fontSize:13,fontFamily:FB,cursor:"pointer"}}>Skip for now</button>
      </div>
    </div>
  );
}

// Shown once per creator, the first time they tap "+ Post Haul" without
// a creator_profiles row. Not skippable — without these fields the fit
// intelligence for every haul they post will be null forever.
function CreatorOnboarding({user, onSave, onCancel}){

  const defaultHandle = "@" + user.email.split("@")[0];

  const [error,setError]=useState(null);

  const canSave = name.trim() && handle.trim() && height && usualSize && build && !saving;

  const save=async()=>{
    setSaving(true);
    setError(null);
    const profile={
      creator_id: user.id,
      name: name.trim(),
      handle: handle.trim().startsWith("@") ? handle.trim() : "@"+handle.trim(),

      usual_size: usualSize,

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(20,20,20,0.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000}}>

        <div style={{fontSize:11,color:C.accent,fontFamily:FB,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>One-time setup</div>

        <div style={{fontSize:13,color:C.muted,fontFamily:FB,marginBottom:18,lineHeight:1.5}}>Your body details power fit intelligence — shoppers see how each piece will fit <em>them</em>, not you.</div>
        <input placeholder="Display name" value={name} onChange={e=>setName(e.target.value)} style={fieldStyle}/>
        <input placeholder="Handle (@yourname)" value={handle} onChange={e=>setHandle(e.target.value)} style={fieldStyle}/>
        <input type="number" placeholder="Height (cm)" value={height} onChange={e=>setHeight(e.target.value)} style={fieldStyle}/>
        <select value={usualSize} onChange={e=>setUsualSize(e.target.value)} style={fieldStyle}>
          <option value="">Usual size</option>
          {["XXS","XS","S","M","L","XL","XXL"].map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <select value={build} onChange={e=>setBuild(e.target.value)} style={fieldStyle}>
          <option value="">Build</option>
          <option value="slim">Slim</option>
          <option value="mid">Mid</option>
          <option value="curvy">Curvy</option>

        <button onClick={save} disabled={!canSave} style={{width:"100%",padding:14,borderRadius:10,background:canSave?C.accent:C.border,color:"white",border:"none",fontSize:15,fontWeight:600,fontFamily:FBtn,cursor:canSave?"pointer":"not-allowed",marginTop:4}}>

function SnapScreen({onBack, onCheckout}){
  const [messages,setMessages]=useState([{role:"ai",text:"Hey! 👋 I'm your personal shopping assistant. Tell me what you're looking for and I'll find it from our creator hauls.\n\nTry something like:\n• \"I want a blazer under $100\"\n• \"Show me something Zara M. wore\"\n• \"Find me Y2K pieces\"",items:[]}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [cartItems,setCartItems]=useState([]);
  const scrollRef=React.useRef();
  const inputRef=React.useRef();

  const [snapHauls,setSnapHauls]=useState([]);
  const [userProfile,setUserProfile]=useState(null);
  const [showFitOnboarding,setShowFitOnboarding]=useState(false);

  useEffect(()=>{
    (async()=>{
      const {data} = await supabase.from("hauls").select("*, haul_items(*)");
      if(!data) return;
      const enriched = await enrichHaulsWithCreatorProfiles(data);
      setSnapHauls(enriched.map(h=>formatHaulForFeed(h, h.haul_items, h._creatorProfile)));
    })();
  },[]);

  useEffect(()=>{
    (async()=>{
      const {data:{user}} = await supabase.auth.getUser();
      if(!user) return;
      const {data} = await supabase.from("user_profiles").select("*").eq("user_id",user.id).maybeSingle();
      if(data && data.height_cm){
        setUserProfile(data);
      } else {
        setShowFitOnboarding(true);
      }
    })();
  },[]);
  // Flatten creator body onto each item so api/chat.js can read it directly
  // and analyzeFit() works without schema awareness.
  const CATALOG=snapHauls.flatMap(h=>h.items.map(item=>({
    ...item,
    creator:h.creator,
    handle:h.handle,
    haul:h.title,
    haulId:h.id,
    creator_height_cm: h.creator_height_cm,
    creator_build: h.creator_build,
    creator_usual_size: h.creator_usual_size,
  })));

  React.useEffect(()=>{
    if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[messages,loading]);

  const sendMessage=async()=>{
    const msg=input.trim();
    if(!msg||loading)return;
    setInput("");
    const newMessages=[...messages,{role:"user",text:msg,items:[]}];
    setMessages(newMessages);
    setLoading(true);
    try{
      const history=newMessages.filter(m=>m.role!=="ai"||messages.indexOf(m)>0).map(m=>({
        role:m.role==="ai"?"assistant":"user",
        content:m.text
      }));
      const resp=await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg,history:history.slice(-6),catalog:CATALOG,userProfile})
      });
      const data=await resp.json();
      if(!resp.ok) throw new Error(data.error||"Failed");
      setMessages(prev=>[...prev,{role:"ai",text:data.text,items:data.items||[]}]);
    }catch(err){
      setMessages(prev=>[...prev,{role:"ai",text:"Sorry, something went wrong. Try again!",items:[]}]);
    }
    setLoading(false);
  };

  const toggleCart=item=>{
    setCartItems(prev=>{
      const exists=prev.find(i=>i.id===item.id);
      if(exists) return prev.filter(i=>i.id!==item.id);
      return [...prev,item];
    });
  };

  const isInCart=id=>cartItems.some(i=>i.id===id);
  const total=cartItems.reduce((s,i)=>s+i.price,0);

  const SUGGESTIONS=["Show me blazers under $100","What did Zara M. wear?","I need Y2K pieces","Find me something for the office","Show me bags"];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {/* Header */}
      <div style={{padding:"14px 16px 10px",flexShrink:0,borderBottom:`1px solid ${C.border}`,background:C.bg}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onBack} style={{width:34,height:34,borderRadius:"50%",border:`1px solid ${C.border}`,background:C.tag,fontSize:15,cursor:"pointer",flexShrink:0}}>←</button>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:800,color:C.dark,fontFamily:FD}}>AI Stylist ✨</div>
            <div style={{fontSize:11,color:C.muted,fontFamily:FB}}>Searches all creator hauls for you</div>
          </div>
          {cartItems.length>0&&(
            <button onClick={()=>onCheckout(cartItems,total)} style={{padding:"7px 14px",borderRadius:20,background:C.accent,color:"white",border:"none",fontFamily:FB,fontWeight:700,fontSize:12,cursor:"pointer"}}>
              🛍 {cartItems.length} · ${total.toFixed(0)}
            </button>
          )}
        </div>
      </div>

      {/* Messages */}
      <div ref={scrollRef} style={{flex:1,overflowY:"auto",padding:"14px 16px 14px",display:"flex",flexDirection:"column",gap:12}}>
        {messages.map((msg,mi)=>(
          <div key={mi}>
            <div style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start"}}>
              <div style={{
                maxWidth:"82%",padding:"10px 14px",borderRadius:msg.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",
                background:msg.role==="user"?C.accent:C.card,
                color:msg.role==="user"?"white":C.dark,
                fontSize:13,fontFamily:FB,lineHeight:1.6,
                border:msg.role==="ai"?`1px solid ${C.border}`:"none",
                boxShadow:msg.role==="ai"?"0 2px 8px rgba(26,18,9,0.06)":"none",
                whiteSpace:"pre-line",
              }}>{msg.text}</div>
            </div>
            {msg.items&&msg.items.length>0&&(
              <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
                {msg.items.map((item,ii)=>(
                  <div key={ii} style={{background:C.card,border:`1.5px solid ${isInCart(item.id)?C.accent:C.border}`,borderRadius:14,padding:12,display:"flex",flexDirection:"column",gap:8,boxShadow:"0 2px 8px rgba(26,18,9,0.04)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:48,height:48,borderRadius:10,background:item.color||"#eee",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👗</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:13,color:C.dark,fontFamily:FB,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.name}</div>
                        <div style={{fontSize:11,color:C.muted,fontFamily:FB}}>{item.brand} · {item.creator}</div>
                        <div style={{fontSize:10,color:C.accent,fontFamily:FB,marginTop:2}}>from {item.haul}</div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
                        <div style={{fontWeight:800,fontSize:14,color:C.dark,fontFamily:FB}}>${item.price?.toFixed(2)}</div>
                        <button onClick={()=>toggleCart(item)} style={{padding:"5px 10px",borderRadius:20,background:isInCart(item.id)?C.accent:C.tag,color:isInCart(item.id)?"white":C.dark,border:"none",fontSize:11,fontWeight:700,fontFamily:FB,cursor:"pointer",whiteSpace:"nowrap"}}>
                          {isInCart(item.id)?"✓ Added":"+ Add"}
                        </button>
                      </div>
                    </div>
                    {item.fit_note && (
                      <div style={{padding:"8px 10px",background:C.accentLight,borderLeft:`2px solid ${C.accent}`,borderRadius:4,fontSize:11,lineHeight:1.4,color:C.dark,fontFamily:FB}}>
                        <span style={{fontWeight:700,marginRight:4}}>Fit</span>{item.fit_note}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",justifyContent:"flex-start"}}>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"18px 18px 18px 4px",padding:"12px 16px",display:"flex",gap:5}}>
              {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:C.muted,animation:`bounce 0.8s ease-in-out ${i*0.2}s infinite alternate`}}/>)}
            </div>
          </div>
        )}
      </div>

      {/* Suggestions */}
      {messages.length<=1&&(
        <div style={{padding:"0 16px 8px",flexShrink:0}}>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
            {SUGGESTIONS.map((s,i)=>(
              <button key={i} onClick={()=>{setInput(s);setTimeout(()=>inputRef.current?.focus(),0);}} style={{flexShrink:0,padding:"7px 12px",borderRadius:20,background:C.card,border:`1px solid ${C.border}`,fontSize:11,color:C.dark,fontFamily:FB,cursor:"pointer",whiteSpace:"nowrap"}}>
                {s}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Input */}
      <div style={{padding:"10px 16px 90px",flexShrink:0,background:C.bg,borderTop:`1px solid ${C.border}`}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input
            ref={inputRef}
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&sendMessage()}
            placeholder="Describe what you're looking for..."
            style={{flex:1,padding:"11px 16px",borderRadius:24,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}
          />
          <button onClick={sendMessage} disabled={!input.trim()||loading} style={{width:42,height:42,borderRadius:"50%",background:input.trim()&&!loading?C.accent:C.border,color:"white",border:"none",cursor:input.trim()&&!loading?"pointer":"not-allowed",fontSize:18,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            ➤
          </button>
        </div>
      </div>

      {showFitOnboarding && (
        <FitOnboarding
          onSave={(profile)=>{setUserProfile(profile); setShowFitOnboarding(false);}}
          onSkip={()=>setShowFitOnboarding(false)}
        />
      )}
    </div>
  );
}

function CheckoutScreen({items,total,onDone}){
  const [stage,setStage]=useState("info"); // info → review → processing → done → error
  const [orders,setOrders]=useState([]);
  const [error,setError]=useState(null);
  const [buyer,setBuyer]=useState({firstName:"",lastName:"",email:"",phone:"",address1:"",address2:"",city:"",province:"",postalCode:"",country:"US"});
  const retailers=[...new Set(items.map(i=>i.brand))];

  const infoComplete=buyer.firstName&&buyer.lastName&&buyer.email&&buyer.phone&&buyer.address1&&buyer.city&&buyer.province&&buyer.postalCode;

  const handlePlaceOrder=async()=>{
    setStage("processing");
    setError(null);
    try{
      const resp=await fetch("/api/checkout",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({items,buyer})
      });
      const data=await resp.json();
      if(!resp.ok) throw new Error(data.error||"Checkout failed");
      setOrders(data.orders||[]);
      setStage("done");
    }catch(err){
      setError(err.message);
      setStage("error");
    }
  };

  if(stage==="done") return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:32,textAlign:"center",overflowY:"auto"}}>
      <div style={{fontSize:64,marginBottom:14}}>🎉</div>
      <div style={{fontSize:24,fontWeight:800,color:C.dark,fontFamily:FD,marginBottom:8}}>Purchase Complete!</div>
      <div style={{fontSize:13,color:C.muted,fontFamily:FB,lineHeight:1.8,marginBottom:20}}>Your order has been placed successfully.<br/>A confirmation email has been sent to<br/><span style={{color:C.dark,fontWeight:600}}>{buyer.email}</span></div>

  if(stage==="info") return(

        <div style={{fontSize:17,fontWeight:800,color:C.dark,fontFamily:FD,marginBottom:4}}>Shipping Info</div>
        <div style={{fontSize:12,color:C.muted,fontFamily:FB,marginBottom:14}}>Where should we ship your order?</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 140px"}}>

          <Field label="Last name" k="lastName" placeholder="Doe" half buyer={buyer} setBuyer={setBuyer}/>
          <Field label="Email" k="email" placeholder="jane@email.com" buyer={buyer} setBuyer={setBuyer}/>
          <Field label="Phone" k="phone" placeholder="+1 212 555 0100" buyer={buyer} setBuyer={setBuyer}/>
          <Field label="Address" k="address1" placeholder="123 Main St" buyer={buyer} setBuyer={setBuyer}/>
          <Field label="Apt / Suite (optional)" k="address2" placeholder="Apt 4B" buyer={buyer} setBuyer={setBuyer}/>
          <Field label="City" k="city" placeholder="New York" half buyer={buyer} setBuyer={setBuyer}/>
          <Field label="State" k="province" placeholder="NY" half buyer={buyer} setBuyer={setBuyer}/>
          <Field label="ZIP Code" k="postalCode" placeholder="10001" half buyer={buyer} setBuyer={setBuyer}/>
          <Field label="Country" k="country" placeholder="US" half buyer={buyer} setBuyer={setBuyer}/>

          Continue to Review →

  );

  // Review stage
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>

        <div style={{background:C.accentLight,border:`1px solid ${C.accent}`,borderRadius:14,padding:"10px 14px",marginBottom:16,fontSize:12,color:C.accent,fontFamily:FB,fontWeight:600}}>⚡ {retailers.length} retailer{retailers.length>1?"s":""} · ships to {buyer.city}, {buyer.province}</div>

          <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Shipping to</div>

function ProfileScreen({user, onSignOut, onUserUpdate}){
  const [editing,setEditing]=useState(false);
  const [name,setName]=useState(user?.user_metadata?.full_name||"");
  const [email,setEmail]=useState(user?.email||"");
  const [newPassword,setNewPassword]=useState("");
  const [confirmPassword,setConfirmPassword]=useState("");
  const [loading,setLoading]=useState(false);
  const [success,setSuccess]=useState(null);
  const [error,setError]=useState(null);

  const initials = user?.user_metadata?.full_name
    ? user.user_metadata.full_name.split(" ").map(n=>n[0]).join("").toUpperCase().slice(0,2)
    : user?.email?.[0]?.toUpperCase()||"?";

  const handleSave=async()=>{
    setLoading(true);
    setError(null);
    setSuccess(null);
    try{
      const updates={};
      if(name!==user.user_metadata?.full_name) updates.data={full_name:name};
      if(email!==user.email) updates.email=email;
      if(newPassword){
        if(newPassword!==confirmPassword) throw new Error("Passwords don't match");
        if(newPassword.length<6) throw new Error("Password must be at least 6 characters");
        updates.password=newPassword;
      }
      if(Object.keys(updates).length===0){ setEditing(false); setLoading(false); return; }
      const{data,error}=await supabase.auth.updateUser(updates);
      if(error) throw error;
      onUserUpdate(data.user);
      setSuccess(email!==user.email?"Check your new email for a confirmation link.":"Profile updated successfully.");
      setNewPassword("");
      setConfirmPassword("");
      setEditing(false);
    }catch(err){
      setError(err.message);
    }
    setLoading(false);
  };

  if(!user) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:32,textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:16}}>👤</div>
      <div style={{fontSize:20,fontWeight:700,fontStyle:"italic",color:C.dark,fontFamily:FD,marginBottom:8}}>Your Profile</div>
      <div style={{fontSize:13,color:C.muted,fontFamily:FB,lineHeight:1.7,marginBottom:24}}>Sign in to view your profile, track orders, and manage your hauls.</div>
    </div>
  );

  return(
    <div style={{padding:"16px 16px 100px",overflowY:"auto",height:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <div style={{fontSize:17,fontWeight:700,fontStyle:"italic",color:C.dark,fontFamily:FD}}>Profile</div>
        <button onClick={()=>{setEditing(!editing);setError(null);setSuccess(null);}} style={{fontSize:12,color:C.accent,fontFamily:FB,fontWeight:700,background:"none",border:"none",cursor:"pointer",padding:0}}>
          {editing?"Cancel":"Edit"}
        </button>
      </div>

      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{width:68,height:68,borderRadius:"50%",background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:800,color:"white",fontFamily:FB,margin:"0 auto 10px"}}>{initials}</div>
        <div style={{fontSize:17,fontWeight:700,fontStyle:"italic",color:C.dark,fontFamily:FD}}>{user.user_metadata?.full_name||"Creator"}</div>
        <div style={{fontSize:12,color:C.muted,fontFamily:FB,marginBottom:6}}>{user.email}</div>
        {user.user_metadata?.is_creator&&<div style={{display:"inline-block",padding:"4px 12px",background:C.accentLight,borderRadius:20,fontSize:11,color:C.accent,fontWeight:700,fontFamily:FB}}>✓ Verified Creator</div>}
      </div>

      {!editing&&(
        <div style={{display:"flex",gap:10,marginBottom:24}}>
          {[{l:"Hauls",v:"0"},{l:"Purchased",v:"$0"},{l:"Followers",v:"0"}].map(s=>(
            <div key={s.l} style={{flex:1,background:C.tag,borderRadius:14,padding:"12px 6px",textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:800,color:C.accent,fontFamily:FD}}>{s.v}</div>
              <div style={{fontSize:10,color:C.muted,fontFamily:FB}}>{s.l}</div>
            </div>
          ))}
        </div>
      )}

      {editing&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Edit Profile</div>

          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:C.muted,fontFamily:FB,marginBottom:4}}>Full name</div>
            <input value={name} onChange={e=>setName(e.target.value)}
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
          </div>

          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:C.muted,fontFamily:FB,marginBottom:4}}>Email</div>
            <input value={email} onChange={e=>setEmail(e.target.value)} type="email"
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
          </div>

          <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,margin:"16px 0 12px"}}>Change Password</div>

          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:C.muted,fontFamily:FB,marginBottom:4}}>New password</div>
            <input value={newPassword} onChange={e=>setNewPassword(e.target.value)} type="password" placeholder="Leave blank to keep current"
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
          </div>

          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,color:C.muted,fontFamily:FB,marginBottom:4}}>Confirm new password</div>
            <input value={confirmPassword} onChange={e=>setConfirmPassword(e.target.value)} type="password" placeholder="Repeat new password"
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
          </div>

          {error&&<div style={{fontSize:12,color:C.accent,fontFamily:FB,marginBottom:12,background:C.accentLight,padding:"8px 12px",borderRadius:8}}>{error}</div>}
          {success&&<div style={{fontSize:12,color:"#2D6A4F",fontFamily:FB,marginBottom:12,background:"#E8F5EE",padding:"8px 12px",borderRadius:8}}>{success}</div>}

          <button onClick={handleSave} disabled={loading}
            style={{width:"100%",padding:13,borderRadius:12,background:loading?C.border:C.dark,color:"white",border:"none",fontWeight:700,fontSize:13,fontFamily:FBtn,cursor:loading?"not-allowed":"pointer",marginBottom:10}}>
            {loading?"Saving...":"Save Changes"}
          </button>
        </div>
      )}

      {success&&!editing&&<div style={{fontSize:12,color:"#2D6A4F",fontFamily:FB,marginBottom:12,background:"#E8F5EE",padding:"8px 12px",borderRadius:8,textAlign:"center"}}>{success}</div>}

      <button onClick={onSignOut} style={{width:"100%",padding:12,borderRadius:12,background:C.tag,color:C.dark,border:`1px solid ${C.border}`,fontWeight:700,fontSize:13,fontFamily:FBtn,cursor:"pointer"}}>Sign Out</button>
    </div>
  );
}


// editingHaul (optional): an existing haul to edit, including its haul_items.
// When set, this component updates the haul row + replaces haul_items instead
// of inserting a new haul. The existing video is preserved unless the user
// explicitly removes it and uploads a new one.
function PostHaulScreen({user, onBack, onPosted, editingHaul=null}){
  const isEdit = Boolean(editingHaul);
  const newItem=()=>({id:Date.now()+Math.random(),name:"",link:"",price:"",brand:"",category:"",fit_style:"",length_on_creator:""});
  const prefillItems = (editingHaul?.haul_items||[]).map(i=>({
    id: i.id,
    name: i.name||"",
    brand: i.brand||"",
    price: i.price!=null?String(i.price):"",
    link: i.link||"",
    category: i.category||"",
    fit_style: i.fit_style||"",
    length_on_creator: i.length_on_creator||"",
  }));
  const [title,setTitle]=useState(editingHaul?.title||"");
  const [videoFile,setVideoFile]=useState(null);
  const [videoPreview,setVideoPreview]=useState(null);
  const [existingVideoUrl,setExistingVideoUrl]=useState(editingHaul?.video_url||null);
  const [items,setItems]=useState(prefillItems.length?prefillItems:[newItem()]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [stage,setStage]=useState("form"); // form | uploading | done

  const [creatorProfile,setCreatorProfile]=useState(null);
  const [profileLoading,setProfileLoading]=useState(true);

  useEffect(()=>{
    (async()=>{
      const {data} = await supabase
        .from("creator_profiles")
        .select("*")
        .eq("creator_id", user.id)
        .maybeSingle();
      setCreatorProfile(data||null);
      setProfileLoading(false);
    })();
  },[user.id]);

  const addItem=()=>setItems(prev=>[...prev,newItem()]);
  const removeItem=(id)=>setItems(prev=>prev.filter(i=>i.id!==id));
  const updateItem=(id,field,val)=>setItems(prev=>prev.map(i=>i.id===id?{...i,[field]:val}:i));

  const handleVideo=(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    setVideoFile(file);
    setVideoPreview(URL.createObjectURL(file));
  };

  const handleSubmit=async()=>{
    if(!title.trim()) return setError("Please add a title.");
    if(!videoFile && !existingVideoUrl) return setError("Please upload a video.");
    const validItems=items.filter(i=>i.link.trim());
    if(validItems.length===0) return setError("Add at least one product link.");

    setLoading(true);
    setStage("uploading");
    setError(null);

    try{
      // 1. Upload the new video (if one was picked). In edit mode, also
      // delete the old object so we don't orphan storage. We upload first;
      // only on success do we touch the old blob — safer if upload fails.
      let videoUrl = existingVideoUrl;
      let newUploadPath = null;
      if(videoFile){
        const ext = videoFile.name.split(".").pop();
        newUploadPath = `hauls/${user.id}/${Date.now()}.${ext}`;
        const {error:uploadError} = await supabase.storage
          .from("haul-videos")
          .upload(newUploadPath, videoFile, {cacheControl:"3600",upsert:false});
        if(uploadError) throw uploadError;
        const {data:{publicUrl}} = supabase.storage
          .from("haul-videos")
          .getPublicUrl(newUploadPath);
        videoUrl = publicUrl;
      }

      let haul;
      if(isEdit){
        // 2a. Update the existing haul row. Leave views/likes alone —
        // editing metadata shouldn't reset engagement counts.
        const updates = {title:title.trim()};
        if(videoFile) updates.video_url = videoUrl;
        const {data,error:updateError} = await supabase
          .from("hauls")
          .update(updates)
          .eq("id", editingHaul.id)
          .select()
          .single();
        if(updateError) throw updateError;
        haul = data;

        // 2b. Replace haul_items entirely. Simpler than diffing — diffing
        // would pay off only if other tables FK into haul_items (cart lines,
        // orders). If that gets added later, move to a proper upsert/diff.
        const {error:delItemsError} = await supabase
          .from("haul_items")
          .delete()
          .eq("haul_id", editingHaul.id);
        if(delItemsError) throw delItemsError;

        // 2c. If the video changed, delete the old blob. Best-effort — a
        // storage leak is strictly worse than a failed save, so we don't
        // throw if this fails.
        if(videoFile && editingHaul.video_url){
          const oldPath = storagePathFromVideoUrl(editingHaul.video_url);
          if(oldPath){
            supabase.storage.from("haul-videos").remove([oldPath])
              .catch(e=>console.warn("Old video cleanup failed:", e.message));
          }
        }
      } else {
        // 2. Insert new haul. creator_name/handle are denormalized snapshots
        // at post time — pulled from the creator's profile so renames on the
        // profile don't retroactively rewrite old hauls.
        const {data,error:haulError} = await supabase
          .from("hauls")
          .insert({
            creator_id: user.id,
            creator_name: creatorProfile.name,
            creator_handle: creatorProfile.handle,
            title: title.trim(),
            video_url: videoUrl,
            views: 0,
            likes: 0,
          })
          .select()
          .single();
        if(haulError) throw haulError;
        haul = data;
      }

      // 3. Insert items. Creator supplies link + fit tags; name/brand/price
      // are populated from Rye via the server-side writeback below.
      // category/fit_style/length_on_creator feed the deterministic fit
      // projection in src/lib/fit.js.
      const itemRows = validItems.map(i=>({
        haul_id: haul.id,
        link: i.link.trim(),
        // Preserve any existing name/brand/price on edit so the UI isn't
        // blank during the brief window before Rye's writeback lands.
        name: i.name||null,
        brand: i.brand||null,
        price: i.price!==""&&i.price!=null?parseFloat(i.price)||0:0,
        category: i.category||null,
        fit_style: i.fit_style||null,
        length_on_creator: i.length_on_creator||null,
      }));
      const {data:insertedItems,error:itemsError} = await supabase
        .from("haul_items")
        .insert(itemRows)
        .select();
      if(itemsError) throw itemsError;

      // 4. Fire & forget — product.js fetches name/brand/price from Rye
      // and writes them back server-side. Runs on both post and edit since
      // Rye is now the sole source of truth for those fields.
      const itemsWithLinks = (insertedItems||[]).filter(i=>i.link);
      if(itemsWithLinks.length>0){
        fetch("/api/product",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({urls:itemsWithLinks.map(i=>({id:i.id,url:i.link}))})
        }).catch(e=>console.warn("Price lookup failed:",e.message));
      }

      setStage("done");
    }catch(err){
      setError(err.message);
      setStage("form");
    }
    setLoading(false);
  };

  if(profileLoading) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%"}}>
      <div style={{display:"flex",gap:6}}>
        {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:C.accent,animation:`bounce 0.8s ease-in-out ${i*0.2}s infinite alternate`}}/>)}
      </div>
    </div>
  );

  // Creator profile is required for a first post. On edit, the haul already
  // exists, so a profile must already exist — skip the gate.
  if(!isEdit && !creatorProfile) return(
    <CreatorOnboarding
      user={user}
      onSave={(p)=>setCreatorProfile(p)}
      onCancel={onBack}
    />
  );

  if(stage==="done") return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:32,textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:16}}>🎉</div>
      <div style={{fontSize:22,fontWeight:700,fontStyle:"italic",color:C.dark,fontFamily:FD,marginBottom:8}}>{isEdit?"Haul Updated!":"Haul Posted!"}</div>
      <div style={{fontSize:13,color:C.muted,fontFamily:FB,lineHeight:1.8,marginBottom:28}}>{isEdit?"Your changes are live.":"Your haul is live. Shoppers can now discover and buy your looks."}</div>
      <button onClick={onPosted} style={{width:"100%",padding:14,borderRadius:14,background:C.dark,color:"white",border:"none",fontWeight:700,fontSize:14,fontFamily:FBtn,cursor:"pointer"}}>{isEdit?"Back to My Hauls":"Back to Feed"}</button>
    </div>
  );

  if(stage==="uploading") return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:32,textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:16}}>📤</div>
      <div style={{fontSize:20,fontWeight:700,fontStyle:"italic",color:C.dark,fontFamily:FD,marginBottom:8}}>{isEdit?"Saving your changes…":"Uploading your haul..."}</div>
      <div style={{fontSize:13,color:C.muted,fontFamily:FB,marginBottom:20}}>{isEdit?"This should only take a moment.":"Uploading video and verifying prices..."}</div>
      <div style={{display:"flex",gap:6}}>
        {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:C.accent,animation:`bounce 0.8s ease-in-out ${i*0.2}s infinite alternate`}}/>)}
      </div>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"16px 16px 0",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
          <button onClick={onBack} style={{width:32,height:32,borderRadius:"50%",background:C.tag,border:"none",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
          <div style={{fontSize:18,fontWeight:700,fontStyle:"italic",color:C.dark,fontFamily:FD}}>{isEdit?"Edit Haul":"Post a Haul"}</div>
        </div>
        <div style={{fontSize:12,color:C.muted,fontFamily:FB,marginBottom:14,paddingLeft:44}}>{isEdit?"Update your look, tags, or video.":"Share your look, earn on every purchase."}</div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"0 16px 120px"}}>

        {/* Video Upload */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Video</div>
          <label style={{display:"block",cursor:"pointer"}}>
            <input type="file" accept="video/*" onChange={handleVideo} style={{display:"none"}}/>
            {videoPreview
              ? <video src={videoPreview} style={{width:"100%",height:160,objectFit:"cover",borderRadius:14,border:`1px solid ${C.border}`}} muted playsInline/>
              : existingVideoUrl
              ? <video src={existingVideoUrl} style={{width:"100%",height:160,objectFit:"cover",borderRadius:14,border:`1px solid ${C.border}`}} muted playsInline/>
              : <div style={{width:"100%",height:160,borderRadius:14,border:`2px dashed ${C.border}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,background:C.tag}}>
                  <div style={{fontSize:28}}>🎬</div>
                  <div style={{fontSize:13,color:C.muted,fontFamily:FB}}>Tap to upload video</div>
                  <div style={{fontSize:11,color:C.border,fontFamily:FB}}>MP4, MOV up to 100MB</div>
                </div>
            }
          </label>
          {videoPreview
            ? <button onClick={()=>{setVideoFile(null);setVideoPreview(null);}} style={{marginTop:6,fontSize:11,color:C.accent,fontFamily:FB,background:"none",border:"none",cursor:"pointer",padding:0}}>Remove video</button>
            : existingVideoUrl
            ? <button onClick={()=>{setExistingVideoUrl(null);}} style={{marginTop:6,fontSize:11,color:C.accent,fontFamily:FB,background:"none",border:"none",cursor:"pointer",padding:0}}>Remove video</button>
            : null
          }
        </div>

        {/* Title */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Title</div>
          <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Summer Office Looks 💼"
            style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
        </div>

        {/* Items */}
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1}}>Items in this haul</div>
            <button onClick={addItem} style={{fontSize:12,color:C.accent,fontFamily:FB,fontWeight:700,background:"none",border:"none",cursor:"pointer",padding:0}}>+ Add item</button>
          </div>

          {items.map((item,idx)=>(
            <div key={item.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:12,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:12,fontWeight:700,color:C.dark,fontFamily:FB}}>Item {idx+1}</div>
                {items.length>1&&<button onClick={()=>removeItem(item.id)} style={{fontSize:11,color:C.muted,fontFamily:FB,background:"none",border:"none",cursor:"pointer",padding:0}}>Remove</button>}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                <div style={{flex:"1 1 100%"}}>
                  <div style={{fontSize:10,color:C.muted,fontFamily:FB,marginBottom:3}}>Product link *</div>
                  <input value={item.link} onChange={e=>updateItem(item.id,"link",e.target.value)} placeholder="https://..."
                    style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:C.bg,fontSize:12,fontFamily:FB,color:C.dark,outline:"none"}}/>
                  <div style={{fontSize:10,color:C.muted,fontFamily:FB,marginTop:4,fontStyle:"italic"}}>Name, brand, and price auto-fill from the product page.</div>
                </div>
                <div style={{flex:"1 1 100%",marginTop:4,fontSize:10,color:C.muted,fontFamily:FB,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Fit tags</div>
                <div style={{flex:"1 1 calc(33% - 6px)"}}>
                  <div style={{fontSize:10,color:C.muted,fontFamily:FB,marginBottom:3}}>Category</div>
                  <select value={item.category} onChange={e=>updateItem(item.id,"category",e.target.value)}
                    style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:C.bg,fontSize:12,fontFamily:FB,color:C.dark,outline:"none"}}>
                    <option value="">—</option>
                    <option value="top">Top</option>
                    <option value="bottom">Bottom</option>
                    <option value="dress">Dress</option>
                    <option value="outerwear">Outerwear</option>
                    <option value="shoes">Shoes</option>
                    <option value="accessory">Accessory</option>
                  </select>
                </div>
                {item.category && !["shoes","accessory"].includes(item.category) && (
                  <div style={{flex:"1 1 calc(33% - 6px)"}}>
                    <div style={{fontSize:10,color:C.muted,fontFamily:FB,marginBottom:3}}>Fit</div>
                    <select value={item.fit_style} onChange={e=>updateItem(item.id,"fit_style",e.target.value)}
                      style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:C.bg,fontSize:12,fontFamily:FB,color:C.dark,outline:"none"}}>
                      <option value="">—</option>
                      <option value="slim">Slim</option>
                      <option value="regular">Regular</option>
                      <option value="relaxed">Relaxed</option>
                      <option value="oversized">Oversized</option>
                    </select>
                  </div>
                )}
                {item.category && !["shoes","accessory","bottom"].includes(item.category) && (
                  <div style={{flex:"1 1 calc(33% - 6px)"}}>
                    <div style={{fontSize:10,color:C.muted,fontFamily:FB,marginBottom:3}}>Length on you</div>
                    <select value={item.length_on_creator} onChange={e=>updateItem(item.id,"length_on_creator",e.target.value)}
                      style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:C.bg,fontSize:12,fontFamily:FB,color:C.dark,outline:"none"}}>
                      <option value="">—</option>
                      <option value="crop">Crop</option>
                      <option value="waist">Waist</option>
                      <option value="hip">Hip</option>
                      <option value="mid_thigh">Mid-thigh</option>
                      <option value="knee">Knee</option>
                      <option value="midi">Midi</option>
                      <option value="maxi">Maxi</option>
                    </select>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>

        {error&&<div style={{fontSize:12,color:C.accent,fontFamily:FB,marginBottom:12,background:C.accentLight,padding:"8px 12px",borderRadius:8}}>{error}</div>}
      </div>

      <div style={{position:"absolute",bottom:0,left:0,right:0,background:C.bg,borderTop:`1px solid ${C.border}`,padding:"14px 16px 28px"}}>
        <button onClick={handleSubmit} disabled={loading}
          style={{width:"100%",padding:14,borderRadius:14,background:C.dark,color:"white",border:"none",fontWeight:700,fontSize:14,fontFamily:FBtn,cursor:"pointer"}}>
          {isEdit?"Save Changes →":"Post Haul →"}
        </button>
      </div>
    </div>
  );
}

function MyHaulsScreen({user, onEdit}){
  const [hauls,setHauls]=useState([]);
  const [loading,setLoading]=useState(true);
  const [deletingId,setDeletingId]=useState(null);
  const [error,setError]=useState(null);

  const refresh=async()=>{
    setLoading(true);
    setError(null);
    const {data,error:fetchError} = await supabase
      .from("hauls")
      .select("*, haul_items(*)")
      .eq("creator_id", user.id)
      .order("created_at", {ascending:false});
    if(fetchError) setError(fetchError.message);
    setHauls(data||[]);
    setLoading(false);
  };

  useEffect(()=>{ refresh(); },[user.id]);

  const handleDelete = async(haul)=>{
    if(!window.confirm(`Delete "${haul.title}"? This can't be undone.`)) return;
    setDeletingId(haul.id);
    setError(null);
    try{
      // haul_items first (in case no ON DELETE CASCADE FK), then hauls row,
      // then the video blob. Order matters: if the haul row delete fails,
      // we shouldn't have already pulled the video from storage.
      const {error:itemsErr} = await supabase.from("haul_items").delete().eq("haul_id", haul.id);
      if(itemsErr) throw itemsErr;
      const {error:haulErr} = await supabase.from("hauls").delete().eq("id", haul.id);
      if(haulErr) throw haulErr;
      if(haul.video_url){
        const p = storagePathFromVideoUrl(haul.video_url);
        if(p){
          // Best-effort; storage leak is survivable, row deletion already landed.
          supabase.storage.from("haul-videos").remove([p])
            .catch(e=>console.warn("Video cleanup failed:", e.message));
        }
      }
      setHauls(prev=>prev.filter(h=>h.id!==haul.id));
    }catch(err){
      setError(err.message);
    }
    setDeletingId(null);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"16px 16px 10px",flexShrink:0}}>
        <div style={{fontSize:22,fontWeight:800,fontStyle:"italic",color:C.dark,fontFamily:FD}}>My Hauls</div>
        <div style={{fontSize:12,color:C.muted,fontFamily:FB,marginTop:2}}>Edit or delete what you've posted.</div>
      </div>
      {error&&<div style={{margin:"0 16px 10px",fontSize:12,color:C.accent,fontFamily:FB,background:C.accentLight,padding:"8px 12px",borderRadius:8}}>{error}</div>}
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 100px"}}>
        {loading
          ? <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 0"}}>
              <div style={{display:"flex",gap:6}}>
                {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:C.accent,animation:`bounce 0.8s ease-in-out ${i*0.2}s infinite alternate`}}/>)}
              </div>
            </div>
          : hauls.length===0
          ? <div style={{textAlign:"center",padding:"48px 16px",color:C.muted,fontFamily:FB,fontSize:13,lineHeight:1.6}}>No hauls yet — tap <span style={{fontWeight:700,color:C.accent}}>+ Post Haul</span> on the Feed to get started.</div>
          : hauls.map(h=>{
              const itemCount = (h.haul_items||[]).length;
              const isDeleting = deletingId===h.id;
              return(
                <div key={h.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden",marginBottom:12,opacity:isDeleting?0.5:1}}>
                  <div style={{display:"flex",gap:12,padding:12}}>
                    {h.video_url
                      ? <video src={h.video_url} style={{width:80,height:80,objectFit:"cover",borderRadius:10,flexShrink:0,background:C.tag}} muted playsInline/>
                      : <div style={{width:80,height:80,borderRadius:10,background:C.tag,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>🎬</div>
                    }
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:14,color:C.dark,fontFamily:FD,fontStyle:"italic",marginBottom:4,lineHeight:1.25,overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{h.title||"Untitled"}</div>
                      <div style={{fontSize:11,color:C.muted,fontFamily:FB}}>{itemCount} item{itemCount===1?"":"s"} · {h.views||0} views</div>
                    </div>
                  </div>
                  <div style={{display:"flex",borderTop:`1px solid ${C.border}`}}>
                    <button onClick={()=>onEdit(h)} disabled={isDeleting}
                      style={{flex:1,padding:10,border:"none",background:"none",fontSize:13,fontWeight:700,color:C.dark,fontFamily:FBtn,cursor:isDeleting?"not-allowed":"pointer"}}>Edit</button>
                    <div style={{width:1,background:C.border}}/>
                    <button onClick={()=>handleDelete(h)} disabled={isDeleting}
                      style={{flex:1,padding:10,border:"none",background:"none",fontSize:13,fontWeight:700,color:C.accent,fontFamily:FBtn,cursor:isDeleting?"not-allowed":"pointer"}}>{isDeleting?"Deleting…":"Delete"}</button>
                  </div>
                </div>
              );
            })
        }
      </div>
    </div>
  );
}

function Nav({screen,set,user}){
  const tabs=[{id:"feed",icon:"▶",label:"Feed"},{id:"snap",icon:"✨",label:"AI Stylist"},{id:"myhauls",icon:"🎥",label:"My Hauls"},{id:"profile",icon:"👤",label:"Profile"}];
  return(
    <div style={{position:"absolute",bottom:0,left:0,right:0,background:"#EDEDED",borderTop:`1px solid ${C.border}`,display:"flex",padding:"8px 0 18px"}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>set(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,border:"none",background:"none",cursor:"pointer",color:screen===t.id?C.accent:C.muted}}>
          {t.id==="profile"&&user
            ? <div style={{width:20,height:20,borderRadius:"50%",background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"white",fontFamily:FB}}>
                {(user.user_metadata?.full_name||user.email||"?")[0].toUpperCase()}
              </div>
            : <span style={{fontSize:18}}>{t.icon}</span>
          }
          <span style={{fontSize:10,fontFamily:FB,fontWeight:screen===t.id?700:500}}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

function App(){
  const [screen,setScreen]=useState("feed");
  const [haul,setHaul]=useState(null);
  const [checkout,setCheckout]=useState(null);
  const [user,setUser]=useState(null);
  const [authModal,setAuthModal]=useState(null); // null | "buy" | "post" | "stylist"
  const [postHaul,setPostHaul]=useState(false);
  const [editingHaul,setEditingHaul]=useState(null);
  const [pendingAction,setPendingAction]=useState(null);
  const showNav=(screen==="feed"||screen==="snap"||screen==="myhauls"||screen==="profile")&&!postHaul&&!editingHaul;

  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null);
    });
    const{data:{subscription}}=supabase.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  const requireAuth=(reason, action)=>{
    if(user){ action&&action(); return; }
    setPendingAction(()=>action);
    setAuthModal(reason);
  };

  const handleAuthSuccess=(u)=>{
    setUser(u);
    setAuthModal(null);
    if(pendingAction){ pendingAction(); setPendingAction(null); }
  };

  const handleNavChange=(tab)=>{
    if(tab==="snap"){ requireAuth("stylist",()=>setScreen("snap")); return; }
    if(tab==="myhauls"){ requireAuth("post",()=>setScreen("myhauls")); return; }
    setScreen(tab);
  };

  return(
    <div style={{width:390,height:780,background:C.bg,borderRadius:44,border:"10px solid #2A2010",boxShadow:"0 40px 100px rgba(0,0,0,0.35)",position:"relative",overflow:"hidden",display:"flex",flexDirection:"column"}}>
      <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:110,height:26,background:"#2A2010",borderRadius:"0 0 16px 16px",zIndex:100}}/>
      <div style={{display:"flex",justifyContent:"space-between",padding:"32px 18px 0",fontSize:10,color:C.muted,fontFamily:FB,fontWeight:600,flexShrink:0}}>
        <span>9:41</span><span>●●●○ 🔋</span>
      </div>
      <div style={{flex:1,position:"relative",overflow:"hidden"}}>
        {screen==="feed"&&!haul&&!postHaul&&<FeedScreen onOpen={h=>{setHaul(h);}} onSnap={()=>handleNavChange("snap")} onProfile={()=>setScreen("profile")} onAuthRequired={(r,a)=>requireAuth(r,a)} onPostHaul={()=>requireAuth("post",()=>setPostHaul(true))}/>}
        {screen==="feed"&&haul&&!checkout&&!postHaul&&<DetailScreen haul={haul} onBack={()=>setHaul(null)} onCheckout={(items,total)=>requireAuth("buy",()=>{setCheckout({items,total});setScreen("checkout");})}/>}
        {screen==="checkout"&&checkout&&<CheckoutScreen items={checkout.items} total={checkout.total} onDone={()=>{setCheckout(null);setHaul(null);setScreen("feed");}}/>}
        {screen==="snap"&&<SnapScreen onBack={()=>setScreen("feed")} onCheckout={(items,total)=>requireAuth("buy",()=>{setCheckout({items,total});setScreen("checkout");})}/>}
        {screen==="profile"&&<ProfileScreen user={user} onSignOut={async()=>{await supabase.auth.signOut();setUser(null);setScreen("feed");}} onUserUpdate={(u)=>setUser(u)}/> }
        {screen==="myhauls"&&user&&!editingHaul&&<MyHaulsScreen user={user} onEdit={(h)=>setEditingHaul(h)}/>}
        {postHaul&&<PostHaulScreen user={user} onBack={()=>setPostHaul(false)} onPosted={()=>{setPostHaul(false);setScreen("feed");}}/>}
        {editingHaul&&<PostHaulScreen user={user} editingHaul={editingHaul} onBack={()=>setEditingHaul(null)} onPosted={()=>{setEditingHaul(null);setScreen("myhauls");}}/>}
      </div>
      {showNav&&<Nav screen={screen} set={handleNavChange} user={user}/>}
      {authModal&&<AuthModal reason={authModal} onClose={()=>setAuthModal(null)} onSuccess={handleAuthSuccess}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
