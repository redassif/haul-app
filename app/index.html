<!DOCTYPE html>
<html lang="en">

  <meta charset="UTF-8" />

<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;

const supabase = window.supabase.createClient(
  'https://kurpgrqmwvyekkynsmuh.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1cnBncnFtd3Z5ZWtreW5zbXVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzU3ODgsImV4cCI6MjA5MTc1MTc4OH0.M7D8EN4p_wSHch9We6gWQjgqesXwpdnd5DcBkoSql10'
);
const C = {bg:"#FAFAFA",dark:"#141414",card:"#FFFFFF",accent:"#8B2635",accentLight:"#8B263512",muted:"#6B6B6B",border:"#E8E8E8",tag:"#F2F0ED"};
const FD="'Libre Baskerville',serif", FB="'Libre Baskerville',serif", FBtn="'DM Sans',sans-serif";

// Hauls now loaded from Supabase — no hardcoded data
const BG_GRADIENTS = [
  "linear-gradient(135deg,#F9E4D4,#F0D5C8)",
  "linear-gradient(135deg,#D4E8F9,#C8D5F0)",
  "linear-gradient(135deg,#E8D4F9,#D8C8F0)",
  "linear-gradient(135deg,#FFF4D4,#FFE8A0)",
  "linear-gradient(135deg,#D4F9E8,#C8F0D5)",
  "linear-gradient(135deg,#F9D4D4,#F0C8C8)",
];
const AV_COLORS = ["#8B2635","#2D6A4F","#7B2D8B","#1A5276","#6E2F1A","#1A3A5C"];

function formatHaulForFeed(haul, items){
  const initial = (haul.creator_name||"?")[0].toUpperCase();
  const idx = haul.id.charCodeAt(0) % BG_GRADIENTS.length;
  return {
    id: haul.id,
    creator: haul.creator_name||"Creator",
    handle: haul.creator_handle||"@user",
    av: initial,
    avc: AV_COLORS[idx % AV_COLORS.length],
    title: haul.title,
    views: haul.views?.toString()||"0",
    likes: haul.likes?.toString()||"0",
    thumb: "🎬",
    bg: BG_GRADIENTS[idx],
    video_url: haul.video_url||null,
    items: (items||[]).map(i=>({
      id: i.id,
      name: i.name,
      brand: i.brand||"",
      price: i.price||0,
      color: "#888888",
      checked: true,
      link: i.link||null,
    })),
  };
}

function Av({l,c,s=36}){
  return <div style={{width:s,height:s,borderRadius:"50%",background:c||"#E8442C",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:s*0.4,color:"#fff",fontFamily:FB,flexShrink:0,border:"2px solid white",boxShadow:"0 2px 8px rgba(0,0,0,0.15)"}}>{l}</div>;
}

function Dot({col}){return <div style={{width:14,height:14,borderRadius:"50%",background:col,border:"1.5px solid #E8E0D5",flexShrink:0}}/>;}


function AuthModal({onClose, onSuccess, reason}){
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [name,setName]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);

  const reasonText={
    buy:"Sign in to complete your purchase",
    post:"Sign in to post a haul as a creator",
    stylist:"Sign in to use the AI Stylist"
  }[reason]||"Sign in to continue";

  const handleSubmit=async()=>{
    setLoading(true);
    setError(null);
    try{
      if(mode==="signup"){
        const{data,error}=await supabase.auth.signUp({
          email,password,
          options:{data:{full_name:name,is_creator:reason==="post"}}
        });
        if(error) throw error;
        onSuccess(data.user);
      } else {
        const{data,error}=await supabase.auth.signInWithPassword({email,password});
        if(error) throw error;
        onSuccess(data.user);
      }
    }catch(err){
      setError(err.message);
    }
    setLoading(false);
  };

  return(
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.6)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
      <div style={{width:"100%",background:C.bg,borderRadius:"24px 24px 0 0",padding:"24px 20px 40px"}}>
        <div style={{width:36,height:4,background:C.border,borderRadius:2,margin:"0 auto 20px"}}/>
        <div style={{fontSize:11,color:C.accent,fontFamily:FB,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{reasonText}</div>
        <div style={{fontSize:22,fontWeight:700,fontStyle:"italic",color:C.dark,fontFamily:FD,marginBottom:20}}>
          {mode==="login"?"Welcome back":"Create account"}
        </div>

        {mode==="signup"&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:C.muted,fontFamily:FB,marginBottom:4}}>Full name</div>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Jane Doe"
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
          </div>
        )}

        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:C.muted,fontFamily:FB,marginBottom:4}}>Email</div>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="jane@email.com" type="email"
            style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
        </div>

        <div style={{marginBottom:error?12:20}}>
          <div style={{fontSize:11,color:C.muted,fontFamily:FB,marginBottom:4}}>Password</div>
          <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" type="password"
            style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
        </div>

        {error&&<div style={{fontSize:12,color:C.accent,fontFamily:FB,marginBottom:14,background:C.accentLight,padding:"8px 12px",borderRadius:8}}>{error}</div>}

        <button onClick={handleSubmit} disabled={loading||!email||!password}
          style={{width:"100%",padding:14,borderRadius:12,background:loading||!email||!password?C.border:C.dark,color:"white",border:"none",fontWeight:700,fontSize:14,fontFamily:FBtn,cursor:loading||!email||!password?"not-allowed":"pointer",marginBottom:12}}>
          {loading?"Please wait...":(mode==="login"?"Sign In":"Create Account")}
        </button>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button onClick={()=>{setMode(mode==="login"?"signup":"login");setError(null);}}
            style={{fontSize:12,color:C.accent,fontFamily:FB,background:"none",border:"none",cursor:"pointer",padding:0}}>
            {mode==="login"?"Don't have an account? Sign up":"Already have an account? Sign in"}
          </button>
          <button onClick={onClose} style={{fontSize:12,color:C.muted,fontFamily:FB,background:"none",border:"none",cursor:"pointer",padding:0}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

function FeedScreen({onOpen,onSnap,onProfile,onAuthRequired,onPostHaul}){
  const [hauls,setHauls]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    const fetchHauls=async()=>{
      setLoading(true);
      const{data,error}=await supabase
        .from("hauls")
        .select("*, haul_items(*)")
        .order("created_at",{ascending:false});
      if(!error&&data){
        setHauls(data.map(h=>formatHaulForFeed(h, h.haul_items)));
      }
      setLoading(false);
    };
    fetchHauls();
  },[]);

  if(loading) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:12}}>
      <div style={{display:"flex",gap:6}}>
        {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:C.accent,animation:`bounce 0.8s ease-in-out ${i*0.2}s infinite alternate`}}/>)}
      </div>
      <div style={{fontSize:12,color:C.muted,fontFamily:FB}}>Loading hauls...</div>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"16px 16px 0",flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:28,fontWeight:800,color:C.dark,fontFamily:FD,fontStyle:"italic",letterSpacing:-1,letterSpacing:-1}}>haul<span style={{color:C.accent}}>.</span></div>
          <button onClick={onPostHaul} style={{padding:"7px 14px",borderRadius:20,background:C.accent,color:"white",border:"none",fontFamily:FBtn,fontWeight:700,fontSize:12,cursor:"pointer"}}>+ Post Haul</button>
        </div>
        <div style={{fontSize:11,color:C.muted,fontFamily:FB,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Trending Hauls</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 100px"}}>
        {hauls.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.muted,fontFamily:FB,fontSize:13}}>No hauls yet. Be the first to post!</div>}
        {hauls.map(h=>{
          const total=h.items.filter(i=>i.checked).reduce((s,i)=>s+i.price,0);
          return(
            <div key={h.id} onClick={()=>onOpen(h)} style={{background:C.card,borderRadius:20,overflow:"hidden",border:`1px solid ${C.border}`,marginBottom:18,boxShadow:"0 4px 24px rgba(26,18,9,0.06)",cursor:"pointer"}}>
              <div style={{height:190,background:h.bg,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
                {h.video_url
                  ? <video src={h.video_url} style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top",position:"absolute",inset:0}} autoPlay muted loop playsInline/>
                  : <div style={{fontSize:60,opacity:0.5}}>{h.thumb}</div>
                }
                <div style={{position:"absolute",bottom:10,left:10,right:10,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:11,color:"white",fontFamily:FB,fontWeight:600,background:"rgba(0,0,0,0.4)",padding:"3px 8px",borderRadius:20}}>▶ {h.views}</span>
                  <span style={{fontSize:11,color:"white",fontFamily:FB,fontWeight:600,background:"rgba(0,0,0,0.4)",padding:"3px 8px",borderRadius:20}}>♥ {h.likes}</span>
                </div>
                <div style={{position:"absolute",top:10,right:10,background:C.accent,borderRadius:20,padding:"3px 10px",fontSize:11,color:"white",fontFamily:FB,fontWeight:700}}>✓ Verified</div>
              </div>
              <div style={{padding:14}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <Av l={h.av} c={h.avc}/>
                  <div><div style={{fontWeight:700,fontSize:13,color:C.dark,fontFamily:FB}}>{h.creator}</div><div style={{fontSize:11,color:C.muted,fontFamily:FB}}>{h.handle}</div></div>
                </div>
                <div style={{fontSize:16,fontWeight:800,color:C.dark,fontFamily:FD,marginBottom:10,lineHeight:1.3}}>{h.title}</div>
                <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>
                  {h.items.slice(0,3).map(item=>(
                    <div key={item.id} style={{display:"flex",alignItems:"center",gap:5,background:C.tag,borderRadius:20,padding:"4px 10px",fontSize:11,color:C.dark,fontFamily:FB}}>
                      <Dot col={item.color}/><span>{item.name.split(" ").slice(0,2).join(" ")}</span>
                    </div>
                  ))}
                  {h.items.length>3&&<div style={{background:C.tag,borderRadius:20,padding:"4px 10px",fontSize:11,color:C.muted,fontFamily:FB}}>+{h.items.length-3} more</div>}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={e=>{e.stopPropagation();onAuthRequired("buy",()=>onOpen(h));}} style={{flex:1,padding:10,borderRadius:12,background:C.accent,color:"white",border:"none",fontWeight:700,fontSize:12,fontFamily:FBtn,cursor:"pointer"}}>Buy Full Look · ${total.toFixed(0)}</button>

                </div>
              </div>
            </div>
          );
        })}

  );
}

function DetailScreen({haul,onBack,onCheckout}){
  const [items,setItems]=useState(haul.items);
  const [loadingPrices,setLoadingPrices]=useState(false);
  const [debugMsg,setDebugMsg]=useState(null);
  const selected=items.filter(i=>i.checked);
  const total=selected.reduce((s,i)=>s+i.price,0);
  const toggle=id=>setItems(items.map(i=>i.id===id?{...i,checked:!i.checked}:i));

  React.useEffect(()=>{
    const itemsWithLinks=haul.items.filter(i=>i.link);
    if(itemsWithLinks.length===0) return;
    setLoadingPrices(true);
    setDebugMsg("Fetching live prices...");
    fetch("/api/product",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({urls:itemsWithLinks.map(i=>({id:i.id,url:i.link}))})
    })
    .then(r=>r.json())
    .then(data=>{
      setDebugMsg(JSON.stringify(data.products?.map(p=>({id:p.id,ok:p.success,name:p.name?.slice(0,20),price:p.price,priceDisplay:p.priceDisplay,img:p.image?.slice(0,30),err:p.error?.slice(0,50)})),null,0));
      if(data.products){
        setItems(prev=>prev.map(item=>{
          const real=data.products.find(p=>p.id===item.id);
          if(real&&real.success){
            return{
              ...item,
              name: real.name||item.name,
              price: real.price||item.price,
              image: real.image||item.image,
              brand: real.brand||item.brand,
              realPrice: real.priceDisplay||null,
            };
          }
          return item;
        }));
      }
    })
    .catch(err=>setDebugMsg("Error: "+err.message))
    .finally(()=>setLoadingPrices(false));
  },[haul.id]);
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{height:220,background:haul.bg,position:"relative",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,overflow:"hidden"}}>
        {haul.video_url
          ? <video src={haul.video_url} style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top",position:"absolute",inset:0}} autoPlay muted loop playsInline/>
          : <div style={{fontSize:64,opacity:0.4}}>{haul.thumb}</div>
        }
        <button onClick={onBack} style={{position:"absolute",top:16,left:16,width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.9)",border:"none",fontSize:16,cursor:"pointer"}}>←</button>
        <div style={{position:"absolute",top:16,right:16,background:C.accent,borderRadius:20,padding:"3px 10px",fontSize:11,color:"white",fontFamily:FB,fontWeight:700}}>✓ Verified</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px 140px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <Av l={haul.av} c={haul.avc}/>
          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:C.dark,fontFamily:FB}}>{haul.creator}</div><div style={{fontSize:11,color:C.muted,fontFamily:FB}}>{haul.handle}</div></div>
          <div style={{fontSize:11,color:C.muted,fontFamily:FB}}>♥ {haul.likes}</div>
        </div>
        <div style={{fontSize:18,fontWeight:800,color:C.dark,fontFamily:FD,marginBottom:4,lineHeight:1.3}}>{haul.title}</div>
        <div style={{fontSize:12,color:C.muted,fontFamily:FB,marginBottom:14}}>Select the pieces you want — or grab the full look.</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1}}>Items in this haul</div>
          <button onClick={()=>setItems(items.map(i=>({...i,checked:true})))} style={{fontSize:12,color:C.accent,fontFamily:FB,fontWeight:700,background:"none",border:"none",cursor:"pointer"}}>Select All</button>
        </div>
        {loadingPrices&&(
          <div style={{background:C.accentLight,border:`1px solid ${C.accent}`,borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",gap:8,alignItems:"center"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:C.accent,animation:"bounce 0.8s ease-in-out infinite alternate"}}/>
            <div style={{fontSize:12,color:C.accent,fontFamily:FB,fontWeight:600}}>Fetching live prices...</div>
          </div>
        )}
        {!loadingPrices&&debugMsg&&(
          <div style={{background:"#FFF8E8",border:"1px solid #E8D080",borderRadius:12,padding:"8px 12px",marginBottom:12,fontSize:10,color:"#5A4800",fontFamily:FB,wordBreak:"break-all"}}>{debugMsg}</div>
        )}
        {items.map(item=>(
          <div key={item.id} onClick={()=>toggle(item.id)} style={{display:"flex",alignItems:"center",gap:10,background:item.checked?C.accentLight:C.tag,border:`1.5px solid ${item.checked?C.accent:C.border}`,borderRadius:14,padding:12,marginBottom:8,cursor:"pointer"}}>
            <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${item.checked?C.accent:C.border}`,background:item.checked?C.accent:"white",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {item.checked&&<span style={{color:"white",fontSize:12,fontWeight:700}}>✓</span>}
            </div>
            {item.image
              ? <img src={item.image} alt={item.name} style={{width:44,height:44,borderRadius:10,objectFit:"cover",flexShrink:0}} onError={e=>{e.target.style.display="none"}}/>
              : <Dot col={item.color}/>
            }
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13,color:C.dark,fontFamily:FB}}>{item.name}</div>
              <div style={{fontSize:11,color:C.muted,fontFamily:FB}}>{item.brand}</div>
            </div>
            <div style={{fontWeight:800,fontSize:14,color:C.dark,fontFamily:FB}}>{item.realPrice||`$${item.price.toFixed(2)}`}</div>
          </div>
        ))}
      </div>
      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"white",borderTop:`1px solid ${C.border}`,padding:"14px 16px 24px",boxShadow:"0 -8px 30px rgba(26,18,9,0.08)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:12,color:C.muted,fontFamily:FB}}>{selected.length} item{selected.length!==1?"s":""} selected</div>
          <div style={{fontSize:19,fontWeight:800,color:C.dark,fontFamily:FD}}>${total.toFixed(2)}</div>
        </div>
        <button onClick={()=>selected.length>0&&onCheckout(selected,total)} disabled={selected.length===0} style={{width:"100%",padding:14,borderRadius:14,border:"none",background:selected.length>0?C.accent:C.border,color:selected.length>0?"white":C.muted,fontWeight:800,fontSize:14,fontFamily:FBtn,cursor:selected.length>0?"pointer":"not-allowed"}}>
          {selected.length>0?`Buy ${selected.length===haul.items.length?"Full Look":"Selected"} — 1 Checkout`:"Select items to buy"}
        </button>
      </div>
    </div>
  );
}

function SnapScreen({onBack, onCheckout}){
  const [messages,setMessages]=useState([{role:"ai",text:"Hey! 👋 I'm your personal shopping assistant. Tell me what you're looking for and I'll find it from our creator hauls.\n\nTry something like:\n• \"I want a blazer under $100\"\n• \"Show me something Zara M. wore\"\n• \"Find me Y2K pieces\"",items:[]}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [cartItems,setCartItems]=useState([]);
  const scrollRef=React.useRef();
  const inputRef=React.useRef();

  const [snapHauls,setSnapHauls]=useState([]);
  useEffect(()=>{supabase.from("hauls").select("*, haul_items(*)").then(({data})=>{if(data)setSnapHauls(data.map(h=>formatHaulForFeed(h,h.haul_items)));});},[]);
  const CATALOG=snapHauls.flatMap(h=>h.items.map(item=>({
    ...item,
    creator:h.creator,
    handle:h.handle,
    haul:h.title,
    haulId:h.id,
  })));

  React.useEffect(()=>{
    if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[messages,loading]);

  const sendMessage=async()=>{
    const msg=input.trim();
    if(!msg||loading)return;
    setInput("");
    const newMessages=[...messages,{role:"user",text:msg,items:[]}];
    setMessages(newMessages);
    setLoading(true);
    try{
      const history=newMessages.filter(m=>m.role!=="ai"||messages.indexOf(m)>0).map(m=>({
        role:m.role==="ai"?"assistant":"user",
        content:m.text
      }));
      const resp=await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg,history:history.slice(-6),catalog:CATALOG})
      });
      const data=await resp.json();
      if(!resp.ok) throw new Error(data.error||"Failed");
      setMessages(prev=>[...prev,{role:"ai",text:data.text,items:data.items||[]}]);
    }catch(err){
      setMessages(prev=>[...prev,{role:"ai",text:"Sorry, something went wrong. Try again!",items:[]}]);
    }
    setLoading(false);
  };

  const toggleCart=item=>{
    setCartItems(prev=>{
      const exists=prev.find(i=>i.id===item.id);
      if(exists) return prev.filter(i=>i.id!==item.id);
      return [...prev,item];
    });
  };

  const isInCart=id=>cartItems.some(i=>i.id===id);
  const total=cartItems.reduce((s,i)=>s+i.price,0);

  const SUGGESTIONS=["Show me blazers under $100","What did Zara M. wear?","I need Y2K pieces","Find me something for the office","Show me bags"];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      {/* Header */}
      <div style={{padding:"14px 16px 10px",flexShrink:0,borderBottom:`1px solid ${C.border}`,background:C.bg}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onBack} style={{width:34,height:34,borderRadius:"50%",border:`1px solid ${C.border}`,background:C.tag,fontSize:15,cursor:"pointer",flexShrink:0}}>←</button>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:800,color:C.dark,fontFamily:FD}}>AI Stylist ✨</div>
            <div style={{fontSize:11,color:C.muted,fontFamily:FB}}>Searches all creator hauls for you</div>
          </div>
          {cartItems.length>0&&(
            <button onClick={()=>onCheckout(cartItems,total)} style={{padding:"7px 14px",borderRadius:20,background:C.accent,color:"white",border:"none",fontFamily:FB,fontWeight:700,fontSize:12,cursor:"pointer"}}>
              🛍 {cartItems.length} · ${total.toFixed(0)}
            </button>
          )}
        </div>
      </div>

      {/* Messages */}
      <div ref={scrollRef} style={{flex:1,overflowY:"auto",padding:"14px 16px 14px",display:"flex",flexDirection:"column",gap:12}}>
        {messages.map((msg,mi)=>(
          <div key={mi}>
            <div style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start"}}>
              <div style={{
                maxWidth:"82%",padding:"10px 14px",borderRadius:msg.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",
                background:msg.role==="user"?C.accent:C.card,
                color:msg.role==="user"?"white":C.dark,
                fontSize:13,fontFamily:FB,lineHeight:1.6,
                border:msg.role==="ai"?`1px solid ${C.border}`:"none",
                boxShadow:msg.role==="ai"?"0 2px 8px rgba(26,18,9,0.06)":"none",
                whiteSpace:"pre-line",
              }}>{msg.text}</div>
            </div>
            {msg.items&&msg.items.length>0&&(
              <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
                {msg.items.map((item,ii)=>(
                  <div key={ii} style={{background:C.card,border:`1.5px solid ${isInCart(item.id)?C.accent:C.border}`,borderRadius:14,padding:12,display:"flex",alignItems:"center",gap:10,boxShadow:"0 2px 8px rgba(26,18,9,0.04)"}}>
                    <div style={{width:48,height:48,borderRadius:10,background:item.color||"#eee",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👗</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:13,color:C.dark,fontFamily:FB,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.name}</div>
                      <div style={{fontSize:11,color:C.muted,fontFamily:FB}}>{item.brand} · {item.creator}</div>
                      <div style={{fontSize:10,color:C.accent,fontFamily:FB,marginTop:2}}>from {item.haul}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
                      <div style={{fontWeight:800,fontSize:14,color:C.dark,fontFamily:FB}}>${item.price?.toFixed(2)}</div>
                      <button onClick={()=>toggleCart(item)} style={{padding:"5px 10px",borderRadius:20,background:isInCart(item.id)?C.accent:C.tag,color:isInCart(item.id)?"white":C.dark,border:"none",fontSize:11,fontWeight:700,fontFamily:FB,cursor:"pointer",whiteSpace:"nowrap"}}>
                        {isInCart(item.id)?"✓ Added":"+ Add"}
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
        {loading&&(
          <div style={{display:"flex",justifyContent:"flex-start"}}>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:"18px 18px 18px 4px",padding:"12px 16px",display:"flex",gap:5}}>
              {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:C.muted,animation:`bounce 0.8s ease-in-out ${i*0.2}s infinite alternate`}}/>)}
            </div>
          </div>
        )}
      </div>

      {/* Suggestions */}
      {messages.length<=1&&(
        <div style={{padding:"0 16px 8px",flexShrink:0}}>
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
            {SUGGESTIONS.map((s,i)=>(
              <button key={i} onClick={()=>{setInput(s);setTimeout(()=>inputRef.current?.focus(),0);}} style={{flexShrink:0,padding:"7px 12px",borderRadius:20,background:C.card,border:`1px solid ${C.border}`,fontSize:11,color:C.dark,fontFamily:FB,cursor:"pointer",whiteSpace:"nowrap"}}>
                {s}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Input */}
      <div style={{padding:"10px 16px 90px",flexShrink:0,background:C.bg,borderTop:`1px solid ${C.border}`}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input
            ref={inputRef}
            value={input}
            onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&sendMessage()}
            placeholder="Describe what you're looking for..."
            style={{flex:1,padding:"11px 16px",borderRadius:24,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}
          />
          <button onClick={sendMessage} disabled={!input.trim()||loading} style={{width:42,height:42,borderRadius:"50%",background:input.trim()&&!loading?C.accent:C.border,color:"white",border:"none",cursor:input.trim()&&!loading?"pointer":"not-allowed",fontSize:18,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
            ➤
          </button>
        </div>
      </div>
    </div>
  );
}

function CheckoutScreen({items,total,onDone}){
  const [stage,setStage]=useState("info"); // info → review → processing → done → error
  const [orders,setOrders]=useState([]);
  const [error,setError]=useState(null);
  const [buyer,setBuyer]=useState({firstName:"",lastName:"",email:"",phone:"",address1:"",address2:"",city:"",province:"",postalCode:"",country:"US"});
  const retailers=[...new Set(items.map(i=>i.brand))];

  const infoComplete=buyer.firstName&&buyer.lastName&&buyer.email&&buyer.phone&&buyer.address1&&buyer.city&&buyer.province&&buyer.postalCode;

  const handlePlaceOrder=async()=>{
    setStage("processing");
    setError(null);
    try{
      const resp=await fetch("/api/checkout",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({items,buyer})
      });
      const data=await resp.json();
      if(!resp.ok) throw new Error(data.error||"Checkout failed");
      setOrders(data.orders||[]);
      setStage("done");
    }catch(err){
      setError(err.message);
      setStage("error");
    }
  };

  if(stage==="done") return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:32,textAlign:"center",overflowY:"auto"}}>
      <div style={{fontSize:64,marginBottom:14}}>🎉</div>
      <div style={{fontSize:24,fontWeight:800,color:C.dark,fontFamily:FD,marginBottom:8}}>Purchase Complete!</div>
      <div style={{fontSize:13,color:C.muted,fontFamily:FB,lineHeight:1.8,marginBottom:20}}>Your order has been placed successfully.<br/>A confirmation email has been sent to<br/><span style={{color:C.dark,fontWeight:600}}>{buyer.email}</span></div>
      <div style={{width:"100%",background:C.tag,borderRadius:16,padding:"14px 16px",marginBottom:18}}>
        {orders.map((o,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<orders.length-1?`1px solid ${C.border}`:"none"}}>
            <div>
              <div style={{fontSize:12,color:C.dark,fontFamily:FB,fontWeight:600}}>{o.item}</div>
              <div style={{fontSize:11,color:C.muted,fontFamily:FB}}>{o.brand}</div>
            </div>
            <span style={{fontSize:12,color:"#2D6A4F",fontFamily:FB,fontWeight:600}}>✓ Confirmed</span>
          </div>
        ))}
      </div>
      <div style={{fontSize:11,color:C.muted,fontFamily:FB,marginBottom:20}}>Items ship directly to you from each retailer.</div>
      <button onClick={onDone} style={{width:"100%",padding:14,borderRadius:14,background:C.accent,color:"white",border:"none",fontWeight:800,fontSize:14,fontFamily:FBtn,cursor:"pointer"}}>Back to Feed</button>
    </div>
  );

  if(stage==="error") return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:32,textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:16}}>⚠️</div>
      <div style={{fontSize:20,fontWeight:800,color:C.dark,fontFamily:FD,marginBottom:8}}>Something went wrong</div>
      <div style={{fontSize:13,color:C.muted,fontFamily:FB,marginBottom:20,lineHeight:1.6}}>{error}</div>
      <button onClick={()=>setStage("review")} style={{width:"100%",padding:14,borderRadius:14,background:C.accent,color:"white",border:"none",fontWeight:800,fontSize:14,fontFamily:FB,cursor:"pointer",marginBottom:10}}>Try Again</button>
      <button onClick={onDone} style={{width:"100%",padding:14,borderRadius:14,background:C.tag,color:C.dark,border:`1px solid ${C.border}`,fontWeight:700,fontSize:14,fontFamily:FB,cursor:"pointer"}}>Back to Feed</button>
    </div>
  );

  if(stage==="processing") return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:32,textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:16}}>⚡</div>
      <div style={{fontSize:21,fontWeight:800,color:C.dark,fontFamily:FD,marginBottom:8}}>Placing your orders...</div>
      <div style={{fontSize:13,color:C.muted,fontFamily:FB,lineHeight:1.8}}>Ordering from {retailers.length} retailer{retailers.length>1?"s":""} simultaneously.<br/>This takes a few seconds.</div>

        {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:C.accent,animation:`bounce 0.8s ease-in-out ${i*0.2}s infinite alternate`}}/>)}
      </div>
    </div>
  );

  if(stage==="info") return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"16px 16px 0",flexShrink:0}}>
        <div style={{fontSize:17,fontWeight:800,color:C.dark,fontFamily:FD,marginBottom:4}}>Shipping Info</div>
        <div style={{fontSize:12,color:C.muted,fontFamily:FB,marginBottom:14}}>Where should we ship your order?</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 140px"}}>
        <div style={{display:"flex",flexWrap:"wrap",gap:"0 10px"}}>
          <Field label="First name" k="firstName" placeholder="Jane" half buyer={buyer} setBuyer={setBuyer}/>
          <Field label="Last name" k="lastName" placeholder="Doe" half buyer={buyer} setBuyer={setBuyer}/>
          <Field label="Email" k="email" placeholder="jane@email.com" buyer={buyer} setBuyer={setBuyer}/>
          <Field label="Phone" k="phone" placeholder="+1 212 555 0100" buyer={buyer} setBuyer={setBuyer}/>
          <Field label="Address" k="address1" placeholder="123 Main St" buyer={buyer} setBuyer={setBuyer}/>
          <Field label="Apt / Suite (optional)" k="address2" placeholder="Apt 4B" buyer={buyer} setBuyer={setBuyer}/>
          <Field label="City" k="city" placeholder="New York" half buyer={buyer} setBuyer={setBuyer}/>
          <Field label="State" k="province" placeholder="NY" half buyer={buyer} setBuyer={setBuyer}/>
          <Field label="ZIP Code" k="postalCode" placeholder="10001" half buyer={buyer} setBuyer={setBuyer}/>
          <Field label="Country" k="country" placeholder="US" half buyer={buyer} setBuyer={setBuyer}/>
        </div>
      </div>
      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"white",borderTop:`1px solid ${C.border}`,padding:"14px 16px 24px",boxShadow:"0 -8px 30px rgba(26,18,9,0.08)"}}>
        <button onClick={()=>infoComplete&&setStage("review")} style={{width:"100%",padding:14,borderRadius:14,background:infoComplete?C.accent:C.border,color:"white",border:"none",fontWeight:800,fontSize:14,fontFamily:FB,cursor:infoComplete?"pointer":"not-allowed"}}>
          Continue to Review →
        </button>
      </div>
    </div>
  );

  // Review stage
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"16px 16px 0",flexShrink:0}}>
        <div style={{fontSize:17,fontWeight:800,color:C.dark,fontFamily:FD,marginBottom:14}}>Review Order</div>
        <div style={{background:C.accentLight,border:`1px solid ${C.accent}`,borderRadius:14,padding:"10px 14px",marginBottom:16,fontSize:12,color:C.accent,fontFamily:FB,fontWeight:600}}>⚡ {retailers.length} retailer{retailers.length>1?"s":""} · ships to {buyer.city}, {buyer.province}</div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 150px"}}>
        <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Items</div>
        {items.map(item=>(
          <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              {item.image

                : <div style={{width:48,height:48,borderRadius:10,background:item.color||"#eee",flexShrink:0}}/>
              }
              <div>
                <div style={{fontSize:13,fontWeight:600,color:C.dark,fontFamily:FB}}>{item.name}</div>
                <div style={{fontSize:11,color:C.muted,fontFamily:FB}}>{item.brand}</div>
              </div>
            </div>
            <div style={{fontWeight:700,fontSize:13,color:C.dark,fontFamily:FB}}>${typeof item.price==="number"?item.price.toFixed(2):item.price}</div>
          </div>
        ))}
        <div style={{marginTop:14,background:C.tag,borderRadius:14,padding:14}}>
          <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Shipping to</div>
          <div style={{fontSize:13,color:C.dark,fontFamily:FB}}>{buyer.firstName} {buyer.lastName}</div>
          <div style={{fontSize:12,color:C.muted,fontFamily:FB}}>{buyer.address1}{buyer.address2?`, ${buyer.address2}`:""}</div>
          <div style={{fontSize:12,color:C.muted,fontFamily:FB}}>{buyer.city}, {buyer.province} {buyer.postalCode}</div>
          <button onClick={()=>setStage("info")} style={{marginTop:8,fontSize:11,color:C.accent,background:"none",border:"none",cursor:"pointer",fontFamily:FB,fontWeight:700,padding:0}}>Edit →</button>
        </div>
      </div>
      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"white",borderTop:`1px solid ${C.border}`,padding:"14px 16px 24px",boxShadow:"0 -8px 30px rgba(26,18,9,0.08)"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
          <div style={{fontSize:12,color:C.muted,fontFamily:FB}}>{items.length} item{items.length!==1?"s":""} · {retailers.length} retailer{retailers.length>1?"s":""}</div>

        <div style={{fontSize:10,color:C.muted,fontFamily:FB,textAlign:"center",marginTop:8}}>Powered by Rye · Orders placed directly at each retailer</div>
      </div>
    </div>
  );
}

function ProfileScreen({user, onSignOut, onUserUpdate}){
  const [editing,setEditing]=useState(false);
  const [name,setName]=useState(user?.user_metadata?.full_name||"");
  const [email,setEmail]=useState(user?.email||"");
  const [newPassword,setNewPassword]=useState("");
  const [confirmPassword,setConfirmPassword]=useState("");
  const [loading,setLoading]=useState(false);
  const [success,setSuccess]=useState(null);
  const [error,setError]=useState(null);

  const initials = user?.user_metadata?.full_name
    ? user.user_metadata.full_name.split(" ").map(n=>n[0]).join("").toUpperCase().slice(0,2)
    : user?.email?.[0]?.toUpperCase()||"?";

  const handleSave=async()=>{
    setLoading(true);
    setError(null);
    setSuccess(null);
    try{
      const updates={};
      if(name!==user.user_metadata?.full_name) updates.data={full_name:name};
      if(email!==user.email) updates.email=email;
      if(newPassword){
        if(newPassword!==confirmPassword) throw new Error("Passwords don't match");
        if(newPassword.length<6) throw new Error("Password must be at least 6 characters");
        updates.password=newPassword;
      }
      if(Object.keys(updates).length===0){ setEditing(false); setLoading(false); return; }
      const{data,error}=await supabase.auth.updateUser(updates);
      if(error) throw error;
      onUserUpdate(data.user);
      setSuccess(email!==user.email?"Check your new email for a confirmation link.":"Profile updated successfully.");
      setNewPassword("");
      setConfirmPassword("");
      setEditing(false);
    }catch(err){
      setError(err.message);
    }
    setLoading(false);
  };

  if(!user) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:32,textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:16}}>👤</div>
      <div style={{fontSize:20,fontWeight:700,fontStyle:"italic",color:C.dark,fontFamily:FD,marginBottom:8}}>Your Profile</div>
      <div style={{fontSize:13,color:C.muted,fontFamily:FB,lineHeight:1.7,marginBottom:24}}>Sign in to view your profile, track orders, and manage your hauls.</div>
    </div>
  );

  return(
    <div style={{padding:"16px 16px 100px",overflowY:"auto",height:"100%"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <div style={{fontSize:17,fontWeight:700,fontStyle:"italic",color:C.dark,fontFamily:FD}}>Profile</div>
        <button onClick={()=>{setEditing(!editing);setError(null);setSuccess(null);}} style={{fontSize:12,color:C.accent,fontFamily:FB,fontWeight:700,background:"none",border:"none",cursor:"pointer",padding:0}}>
          {editing?"Cancel":"Edit"}
        </button>
      </div>

      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{width:68,height:68,borderRadius:"50%",background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:800,color:"white",fontFamily:FB,margin:"0 auto 10px"}}>{initials}</div>
        <div style={{fontSize:17,fontWeight:700,fontStyle:"italic",color:C.dark,fontFamily:FD}}>{user.user_metadata?.full_name||"Creator"}</div>
        <div style={{fontSize:12,color:C.muted,fontFamily:FB,marginBottom:6}}>{user.email}</div>
        {user.user_metadata?.is_creator&&<div style={{display:"inline-block",padding:"4px 12px",background:C.accentLight,borderRadius:20,fontSize:11,color:C.accent,fontWeight:700,fontFamily:FB}}>✓ Verified Creator</div>}
      </div>

      {!editing&&(
        <div style={{display:"flex",gap:10,marginBottom:24}}>
          {[{l:"Hauls",v:"0"},{l:"Purchased",v:"$0"},{l:"Followers",v:"0"}].map(s=>(
            <div key={s.l} style={{flex:1,background:C.tag,borderRadius:14,padding:"12px 6px",textAlign:"center"}}>
              <div style={{fontSize:18,fontWeight:800,color:C.accent,fontFamily:FD}}>{s.v}</div>
              <div style={{fontSize:10,color:C.muted,fontFamily:FB}}>{s.l}</div>
            </div>
          ))}
        </div>
      )}

      {editing&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>Edit Profile</div>

          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:C.muted,fontFamily:FB,marginBottom:4}}>Full name</div>
            <input value={name} onChange={e=>setName(e.target.value)}
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
          </div>

          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:C.muted,fontFamily:FB,marginBottom:4}}>Email</div>
            <input value={email} onChange={e=>setEmail(e.target.value)} type="email"
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
          </div>

          <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,margin:"16px 0 12px"}}>Change Password</div>

          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:C.muted,fontFamily:FB,marginBottom:4}}>New password</div>
            <input value={newPassword} onChange={e=>setNewPassword(e.target.value)} type="password" placeholder="Leave blank to keep current"
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
          </div>

          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,color:C.muted,fontFamily:FB,marginBottom:4}}>Confirm new password</div>
            <input value={confirmPassword} onChange={e=>setConfirmPassword(e.target.value)} type="password" placeholder="Repeat new password"
              style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
          </div>

          {error&&<div style={{fontSize:12,color:C.accent,fontFamily:FB,marginBottom:12,background:C.accentLight,padding:"8px 12px",borderRadius:8}}>{error}</div>}
          {success&&<div style={{fontSize:12,color:"#2D6A4F",fontFamily:FB,marginBottom:12,background:"#E8F5EE",padding:"8px 12px",borderRadius:8}}>{success}</div>}

          <button onClick={handleSave} disabled={loading}
            style={{width:"100%",padding:13,borderRadius:12,background:loading?C.border:C.dark,color:"white",border:"none",fontWeight:700,fontSize:13,fontFamily:FBtn,cursor:loading?"not-allowed":"pointer",marginBottom:10}}>
            {loading?"Saving...":"Save Changes"}
          </button>
        </div>
      )}

      {success&&!editing&&<div style={{fontSize:12,color:"#2D6A4F",fontFamily:FB,marginBottom:12,background:"#E8F5EE",padding:"8px 12px",borderRadius:8,textAlign:"center"}}>{success}</div>}

      <button onClick={onSignOut} style={{width:"100%",padding:12,borderRadius:12,background:C.tag,color:C.dark,border:`1px solid ${C.border}`,fontWeight:700,fontSize:13,fontFamily:FBtn,cursor:"pointer"}}>Sign Out</button>
    </div>
  );
}


function PostHaulScreen({user, onBack, onPosted}){
  const [title,setTitle]=useState("");
  const [videoFile,setVideoFile]=useState(null);
  const [videoPreview,setVideoPreview]=useState(null);
  const [items,setItems]=useState([{id:Date.now(),name:"",link:"",price:"",brand:""}]);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [stage,setStage]=useState("form"); // form | uploading | done

  const addItem=()=>setItems(prev=>[...prev,{id:Date.now(),name:"",link:"",price:"",brand:""}]);
  const removeItem=(id)=>setItems(prev=>prev.filter(i=>i.id!==id));
  const updateItem=(id,field,val)=>setItems(prev=>prev.map(i=>i.id===id?{...i,[field]:val}:i));

  const handleVideo=(e)=>{
    const file=e.target.files[0];
    if(!file) return;
    setVideoFile(file);
    setVideoPreview(URL.createObjectURL(file));
  };

  const handleSubmit=async()=>{
    if(!title.trim()) return setError("Please add a title.");
    if(!videoFile) return setError("Please upload a video.");
    const validItems=items.filter(i=>i.name.trim());
    if(validItems.length===0) return setError("Add at least one item.");

    setLoading(true);
    setStage("uploading");
    setError(null);

    try{
      // 1. Upload video to Supabase Storage
      const ext=videoFile.name.split(".").pop();
      const path=`hauls/${user.id}/${Date.now()}.${ext}`;
      const{error:uploadError}=await supabase.storage
        .from("haul-videos")
        .upload(path, videoFile, {cacheControl:"3600",upsert:false});
      if(uploadError) throw uploadError;

      // 2. Get public URL
      const{data:{publicUrl}}=supabase.storage
        .from("haul-videos")
        .getPublicUrl(path);

      // 3. Insert haul record
      const{data:haul,error:haulError}=await supabase
        .from("hauls")
        .insert({
          creator_id: user.id,
          creator_name: user.user_metadata?.full_name||user.email,
          creator_handle: "@"+user.email.split("@")[0],
          title: title.trim(),
          video_url: publicUrl,
          views: 0,
          likes: 0,
        })
        .select()
        .single();
      if(haulError) throw haulError;

      // 4. Insert items with user-provided prices first
      const itemRows=validItems.map(i=>({
        haul_id: haul.id,
        name: i.name.trim(),
        brand: i.brand.trim(),
        price: parseFloat(i.price)||0,
        link: i.link.trim(),
      }));
      const{data:insertedItems,error:itemsError}=await supabase
        .from("haul_items")
        .insert(itemRows)
        .select();
      if(itemsError) throw itemsError;

      // 5. Fetch real prices from Rye API for items with links and update DB
      const itemsWithLinks=(insertedItems||[]).filter(i=>i.link);
      if(itemsWithLinks.length>0){
        try{
          const resp=await fetch("/api/product",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({urls:itemsWithLinks.map(i=>({id:i.id,url:i.link}))})
          });
          const data=await resp.json();
          if(data.products){
            // Update each item in DB with real price/name/brand from Rye
            await Promise.all(
              data.products
                .filter(p=>p.success)
                .map(p=>supabase.from("haul_items").update({
                  price: p.price||undefined,
                  name: p.name||undefined,
                  brand: p.brand||undefined,
                }).eq("id",p.id))
            );
          }
        }catch(e){
          // Price fetch failed — keep user-entered prices, don't block posting
          console.warn("Price lookup failed:", e.message);
        }
      }

      setStage("done");
    }catch(err){
      setError(err.message);
      setStage("form");
    }
    setLoading(false);
  };

  if(stage==="done") return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:32,textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:16}}>🎉</div>
      <div style={{fontSize:22,fontWeight:700,fontStyle:"italic",color:C.dark,fontFamily:FD,marginBottom:8}}>Haul Posted!</div>
      <div style={{fontSize:13,color:C.muted,fontFamily:FB,lineHeight:1.8,marginBottom:28}}>Your haul is live. Shoppers can now discover and buy your looks.</div>
      <button onClick={onPosted} style={{width:"100%",padding:14,borderRadius:14,background:C.dark,color:"white",border:"none",fontWeight:700,fontSize:14,fontFamily:FBtn,cursor:"pointer"}}>Back to Feed</button>
    </div>
  );

  if(stage==="uploading") return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",padding:32,textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:16}}>📤</div>
      <div style={{fontSize:20,fontWeight:700,fontStyle:"italic",color:C.dark,fontFamily:FD,marginBottom:8}}>Uploading your haul...</div>
      <div style={{fontSize:13,color:C.muted,fontFamily:FB,marginBottom:20}}>Uploading video and verifying prices...</div>
      <div style={{display:"flex",gap:6}}>
        {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:C.accent,animation:`bounce 0.8s ease-in-out ${i*0.2}s infinite alternate`}}/>)}
      </div>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"16px 16px 0",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
          <button onClick={onBack} style={{width:32,height:32,borderRadius:"50%",background:C.tag,border:"none",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
          <div style={{fontSize:18,fontWeight:700,fontStyle:"italic",color:C.dark,fontFamily:FD}}>Post a Haul</div>
        </div>
        <div style={{fontSize:12,color:C.muted,fontFamily:FB,marginBottom:14,paddingLeft:44}}>Share your look, earn on every purchase.</div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"0 16px 120px"}}>

        {/* Video Upload */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Video</div>
          <label style={{display:"block",cursor:"pointer"}}>
            <input type="file" accept="video/*" onChange={handleVideo} style={{display:"none"}}/>
            {videoPreview
              ? <video src={videoPreview} style={{width:"100%",height:160,objectFit:"cover",borderRadius:14,border:`1px solid ${C.border}`}} muted playsInline/>
              : <div style={{width:"100%",height:160,borderRadius:14,border:`2px dashed ${C.border}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,background:C.tag}}>
                  <div style={{fontSize:28}}>🎬</div>
                  <div style={{fontSize:13,color:C.muted,fontFamily:FB}}>Tap to upload video</div>
                  <div style={{fontSize:11,color:C.border,fontFamily:FB}}>MP4, MOV up to 100MB</div>
                </div>
            }
          </label>
          {videoPreview&&<button onClick={()=>{setVideoFile(null);setVideoPreview(null);}} style={{marginTop:6,fontSize:11,color:C.accent,fontFamily:FB,background:"none",border:"none",cursor:"pointer",padding:0}}>Remove video</button>}
        </div>

        {/* Title */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Title</div>
          <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Summer Office Looks 💼"
            style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1px solid ${C.border}`,background:C.card,fontSize:13,fontFamily:FB,color:C.dark,outline:"none"}}/>
        </div>

        {/* Items */}
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:700,color:C.dark,fontFamily:FB,textTransform:"uppercase",letterSpacing:1}}>Items in this haul</div>
            <button onClick={addItem} style={{fontSize:12,color:C.accent,fontFamily:FB,fontWeight:700,background:"none",border:"none",cursor:"pointer",padding:0}}>+ Add item</button>
          </div>

          {items.map((item,idx)=>(
            <div key={item.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:12,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:12,fontWeight:700,color:C.dark,fontFamily:FB}}>Item {idx+1}</div>
                {items.length>1&&<button onClick={()=>removeItem(item.id)} style={{fontSize:11,color:C.muted,fontFamily:FB,background:"none",border:"none",cursor:"pointer",padding:0}}>Remove</button>}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                <div style={{flex:"1 1 calc(60% - 4px)"}}>
                  <div style={{fontSize:10,color:C.muted,fontFamily:FB,marginBottom:3}}>Item name *</div>
                  <input value={item.name} onChange={e=>updateItem(item.id,"name",e.target.value)} placeholder="Tailored Midi Skirt"
                    style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:C.bg,fontSize:12,fontFamily:FB,color:C.dark,outline:"none"}}/>
                </div>
                <div style={{flex:"1 1 calc(40% - 4px)"}}>
                  <div style={{fontSize:10,color:C.muted,fontFamily:FB,marginBottom:3}}>Brand</div>
                  <input value={item.brand} onChange={e=>updateItem(item.id,"brand",e.target.value)} placeholder="Zara"
                    style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:C.bg,fontSize:12,fontFamily:FB,color:C.dark,outline:"none"}}/>
                </div>
                <div style={{flex:"1 1 calc(40% - 4px)"}}>
                  <div style={{fontSize:10,color:C.muted,fontFamily:FB,marginBottom:3}}>Price ($)</div>
                  <input value={item.price} onChange={e=>updateItem(item.id,"price",e.target.value)} placeholder="99.99" type="number"
                    style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:C.bg,fontSize:12,fontFamily:FB,color:C.dark,outline:"none"}}/>
                </div>
                <div style={{flex:"1 1 calc(60% - 4px)"}}>
                  <div style={{fontSize:10,color:C.muted,fontFamily:FB,marginBottom:3}}>Product link</div>
                  <input value={item.link} onChange={e=>updateItem(item.id,"link",e.target.value)} placeholder="https://..."
                    style={{width:"100%",padding:"8px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:C.bg,fontSize:12,fontFamily:FB,color:C.dark,outline:"none"}}/>
                </div>
              </div>
            </div>
          ))}
        </div>

        {error&&<div style={{fontSize:12,color:C.accent,fontFamily:FB,marginBottom:12,background:C.accentLight,padding:"8px 12px",borderRadius:8}}>{error}</div>}
      </div>

      <div style={{position:"absolute",bottom:0,left:0,right:0,background:C.bg,borderTop:`1px solid ${C.border}`,padding:"14px 16px 28px"}}>
        <button onClick={handleSubmit} disabled={loading}
          style={{width:"100%",padding:14,borderRadius:14,background:C.dark,color:"white",border:"none",fontWeight:700,fontSize:14,fontFamily:FBtn,cursor:"pointer"}}>
          Post Haul →
        </button>
      </div>
    </div>
  );
}

function Nav({screen,set,user}){
  const tabs=[{id:"feed",icon:"▶",label:"Feed"},{id:"snap",icon:"✨",label:"AI Stylist"},{id:"profile",icon:"👤",label:"Profile"}];
  return(
    <div style={{position:"absolute",bottom:0,left:0,right:0,background:"#EDEDED",borderTop:`1px solid ${C.border}`,display:"flex",padding:"8px 0 18px"}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>set(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,border:"none",background:"none",cursor:"pointer",color:screen===t.id?C.accent:C.muted}}>
          {t.id==="profile"&&user
            ? <div style={{width:20,height:20,borderRadius:"50%",background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"white",fontFamily:FB}}>
                {(user.user_metadata?.full_name||user.email||"?")[0].toUpperCase()}
              </div>
            : <span style={{fontSize:18}}>{t.icon}</span>
          }
          <span style={{fontSize:10,fontFamily:FB,fontWeight:screen===t.id?700:500}}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

function App(){
  const [screen,setScreen]=useState("feed");
  const [haul,setHaul]=useState(null);
  const [checkout,setCheckout]=useState(null);
  const [user,setUser]=useState(null);
  const [authModal,setAuthModal]=useState(null); // null | "buy" | "post" | "stylist"
  const [postHaul,setPostHaul]=useState(false);
  const [pendingAction,setPendingAction]=useState(null);
  const showNav=(screen==="feed"||screen==="snap"||screen==="profile")&&!postHaul;

  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null);
    });
    const{data:{subscription}}=supabase.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  const requireAuth=(reason, action)=>{
    if(user){ action&&action(); return; }
    setPendingAction(()=>action);
    setAuthModal(reason);
  };

  const handleAuthSuccess=(u)=>{
    setUser(u);
    setAuthModal(null);
    if(pendingAction){ pendingAction(); setPendingAction(null); }
  };

  const handleNavChange=(tab)=>{
    if(tab==="snap"){ requireAuth("stylist",()=>setScreen("snap")); return; }
    setScreen(tab);
  };

  return(
    <div style={{width:390,height:780,background:C.bg,borderRadius:44,border:"10px solid #2A2010",boxShadow:"0 40px 100px rgba(0,0,0,0.35)",position:"relative",overflow:"hidden",display:"flex",flexDirection:"column"}}>
      <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:110,height:26,background:"#2A2010",borderRadius:"0 0 16px 16px",zIndex:100}}/>
      <div style={{display:"flex",justifyContent:"space-between",padding:"32px 18px 0",fontSize:10,color:C.muted,fontFamily:FB,fontWeight:600,flexShrink:0}}>
        <span>9:41</span><span>●●●○ 🔋</span>
      </div>
      <div style={{flex:1,position:"relative",overflow:"hidden"}}>
        {screen==="feed"&&!haul&&!postHaul&&<FeedScreen onOpen={h=>{setHaul(h);}} onSnap={()=>handleNavChange("snap")} onProfile={()=>setScreen("profile")} onAuthRequired={(r,a)=>requireAuth(r,a)} onPostHaul={()=>requireAuth("post",()=>setPostHaul(true))}/>}
        {screen==="feed"&&haul&&!checkout&&!postHaul&&<DetailScreen haul={haul} onBack={()=>setHaul(null)} onCheckout={(items,total)=>requireAuth("buy",()=>{setCheckout({items,total});setScreen("checkout");})}/>}
        {screen==="checkout"&&checkout&&<CheckoutScreen items={checkout.items} total={checkout.total} onDone={()=>{setCheckout(null);setHaul(null);setScreen("feed");}}/>}
        {screen==="snap"&&<SnapScreen onBack={()=>setScreen("feed")} onCheckout={(items,total)=>requireAuth("buy",()=>{setCheckout({items,total});setScreen("checkout");})}/>}
        {screen==="profile"&&<ProfileScreen user={user} onSignOut={async()=>{await supabase.auth.signOut();setUser(null);setScreen("feed");}} onUserUpdate={(u)=>setUser(u)}/> }
        {postHaul&&<PostHaulScreen user={user} onBack={()=>setPostHaul(false)} onPosted={()=>{setPostHaul(false);setScreen("feed");}}/>}
      </div>
      {showNav&&<Nav screen={screen} set={handleNavChange} user={user}/>}
      {authModal&&<AuthModal reason={authModal} onClose={()=>setAuthModal(null)} onSuccess={handleAuthSuccess}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
